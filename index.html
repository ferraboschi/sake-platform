<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --bg2: #ebe5d8; --bg3: #e0d9cc;
  --surface: #ffffff; --surface2: #faf7f2;
  --border: #d5cec0; --border2: #c0b8a8;
  --text: #1a2a44; --text2: #4a5568; --text3: #8a8070;
  --accent: #3a6ea5; --accent2: #2d5a8a; --accent-glow: rgba(58,110,165,0.12);
  --gold: #c8a45e; --green: #34a853; --green2: rgba(52,168,83,0.1);
  --navy: #1a2a44; --red: #d93025;
  --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
  --font: 'Inter','Noto Sans JP',sans-serif; --font-serif: 'Noto Serif JP',serif;
  --shadow: 0 4px 24px rgba(26,42,68,0.08); --shadow-lg: 0 8px 48px rgba(26,42,68,0.12);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* TOPBAR */
.topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:rgba(26,42,68,0.97); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.08); }
.topbar-left { display:flex; align-items:center; gap:24px; }
.topbar-logo { font-family:var(--font-serif); font-size:17px; font-weight:600; color:#fff; letter-spacing:0.5px; display:flex; align-items:center; gap:8px; cursor:pointer; white-space:nowrap; }
.topbar-logo .logo-mark { color:var(--gold); font-size:13px; font-weight:500; letter-spacing:1px; }
.topbar-nav { display:flex; gap:4px; }
.topbar-nav a { color:rgba(255,255,255,0.45); font:500 12px var(--font); padding:6px 12px; border-radius:6px; cursor:pointer; transition:var(--transition); text-decoration:none; letter-spacing:0.3px; }
.topbar-nav a:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.06); }
.topbar-nav a.active { color:#fff; background:rgba(255,255,255,0.1); }
.topbar-right { display:flex; align-items:center; gap:6px; }
.lang-switcher { display:flex; gap:1px; background:rgba(255,255,255,0.08); border-radius:8px; padding:2px; border:1px solid rgba(255,255,255,0.1); }
.lang-btn { background:none; border:none; color:rgba(255,255,255,0.4); font:600 10px var(--font); padding:5px 10px; border-radius:6px; cursor:pointer; transition:var(--transition); letter-spacing:0.5px; }
.lang-btn:hover { color:rgba(255,255,255,0.7); }
.lang-btn.active { background:var(--gold); color:var(--navy); }
.topbar-user { display:none; align-items:center; gap:8px; margin-left:8px; padding-left:12px; border-left:1px solid rgba(255,255,255,0.1); }
.topbar-user-name { color:rgba(255,255,255,0.6); font:500 12px var(--font); }
.topbar-user-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); cursor:pointer; font:500 11px var(--font); padding:5px 12px; border-radius:6px; transition:var(--transition); }
.topbar-user-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }

.screen { display:none; min-height:100vh; padding-top:56px; }
.screen.active { display:block; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border:none; border-radius:var(--radius-sm); font:500 13px var(--font); cursor:pointer; transition:var(--transition); text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-lg { padding:14px 32px; font-size:15px; border-radius:12px; }
.btn-full { width:100%; }
.btn-gold { background:var(--gold); color:#fff; }
.btn-gold:hover { background:#b8944e; }

/* SEARCH PAGE */
.hero { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:calc(100vh - 56px); padding:100px 24px 60px; transition:padding 0.4s ease; }
.hero.has-results { padding-top:48px; }
.hero-kanji { font-family:var(--font-serif); font-size:52px; font-weight:700; color:var(--navy); letter-spacing:6px; margin-bottom:10px; transition:all 0.4s ease; }
.hero.has-results .hero-kanji { font-size:28px; letter-spacing:3px; margin-bottom:6px; }
.hero-sub { font-size:13px; color:var(--text3); letter-spacing:2px; margin-bottom:44px; transition:all 0.4s ease; }
.hero.has-results .hero-sub { font-size:11px; margin-bottom:20px; }
.search-box { position:relative; width:100%; max-width:520px; }
.search-box input { width:100%; height:58px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:0 58px 0 22px; font:400 16px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.search-box input:disabled { opacity:0.5; }
.search-go { position:absolute; right:7px; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
.search-go:hover { background:var(--accent2); }
.search-go:disabled { opacity:0.4; cursor:not-allowed; }
.search-hint { margin-top:18px; font-size:12px; color:var(--text3); max-width:520px; text-align:center; line-height:1.6; }
.search-hint strong { color:var(--text2); font-weight:500; }

/* INLINE RESULT */
.inline-result { width:100%; max-width:580px; margin-top:24px; }
.search-status { display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); font-size:13px; color:var(--text2); }
.search-status .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:blink 1s ease infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.search-step { margin-top:2px; font-size:11px; color:var(--text3); }

/* BREWERY CARD */
.brewery-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); animation:slideUp 0.5s ease; overflow:hidden; }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.bc-header { display:flex; align-items:center; gap:16px; padding:24px 24px 0; }
.bc-logo { width:56px; height:56px; border-radius:14px; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.bc-logo img { width:100%; height:100%; object-fit:contain; }
.bc-logo-fallback { font-size:28px; }
.bc-title { flex:1; }
.bc-name-jp { font-family:var(--font-serif); font-size:22px; font-weight:600; line-height:1.3; }
.bc-name-en { font-size:12px; color:var(--text3); margin-top:2px; }

.bc-body { padding:20px 24px; }
.bc-website { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:var(--accent-glow); border:1px solid rgba(58,110,165,0.15); border-radius:20px; font-size:13px; font-weight:500; color:var(--accent); margin-bottom:16px; text-decoration:none; }
.bc-website:hover { background:rgba(58,110,165,0.18); }

.bc-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.bc-info-item { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:var(--text2); }
.bc-info-item .icon { font-size:14px; flex-shrink:0; margin-top:1px; }
.bc-info-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.bc-info-value { font-size:12px; color:var(--text); margin-top:1px; }

.bc-history { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:16px; padding:14px 16px; background:var(--surface2); border-radius:var(--radius-sm); border-left:3px solid var(--gold); }

.bc-products-badge { display:flex; align-items:center; gap:10px; padding:14px 18px; background:linear-gradient(135deg, var(--green2), rgba(52,168,83,0.05)); border:1px solid rgba(52,168,83,0.2); border-radius:var(--radius); margin-bottom:4px; }
.bc-products-number { font-size:28px; font-weight:700; color:var(--green); font-variant-numeric:tabular-nums; }
.bc-products-label { font-size:13px; color:var(--green); font-weight:500; line-height:1.3; }
.bc-products-sublabel { font-size:11px; color:var(--text3); font-weight:400; }

.bc-map { border-top:1px solid var(--border); }

.bc-sources { padding:10px 24px; background:var(--surface2); border-top:1px solid var(--border); font-size:10px; color:var(--text3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.bc-source-tag { padding:2px 8px; background:var(--bg); border-radius:10px; font-size:10px; }

.bc-cta { padding:20px 24px; border-top:1px solid var(--border); text-align:center; }
.bc-cta-text { font-size:14px; color:var(--text2); margin-bottom:14px; }
.bc-cta-actions { display:flex; gap:10px; justify-content:center; align-items:center; }
.bc-retry { font-size:12px; color:var(--text3); background:none; border:none; cursor:pointer; padding:8px 14px; }
.bc-retry:hover { color:var(--accent); }

/* REGISTER */
.register-page { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 56px); padding:40px 24px; }
.register-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:40px; max-width:480px; width:100%; box-shadow:var(--shadow-lg); }
.reg-header { text-align:center; margin-bottom:24px; }
.reg-header h2 { font-size:20px; font-weight:600; margin-bottom:6px; }
.reg-header p { font-size:13px; color:var(--text3); }
.reg-brewery-mini { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--accent-glow); border:1px solid rgba(58,110,165,0.15); border-radius:var(--radius-sm); margin-bottom:24px; }
.reg-brewery-mini img { width:28px; height:28px; border-radius:6px; }
.reg-brewery-mini .fallback { width:28px; height:28px; border-radius:6px; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:14px; }
.reg-brewery-mini span { font-size:14px; font-weight:500; color:var(--accent); }
.reg-form label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin:16px 0 6px; text-transform:uppercase; letter-spacing:0.5px; }
.reg-form label:first-child { margin-top:0; }
.reg-form input { width:100%; height:44px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 14px; font:400 14px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.reg-form input:focus { border-color:var(--accent); }
.domain-hint { margin-top:8px; padding:10px 14px; background:var(--green2); border:1px solid rgba(52,168,83,0.2); border-radius:var(--radius-sm); font-size:12px; color:var(--green); display:none; }
.verification-sent { text-align:center; padding:32px; display:none; }
.verification-sent .icon { font-size:48px; margin-bottom:12px; }
.verification-sent h3 { font-size:18px; margin-bottom:8px; }
.verification-sent p { font-size:13px; color:var(--text3); line-height:1.6; }

/* DASHBOARD */
.dashboard { max-width:800px; margin:0 auto; padding:80px 24px 60px; }
.dash-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:32px; }
.dash-brewery { font-family:var(--font-serif); font-size:24px; font-weight:600; display:flex; align-items:center; gap:8px; }
.dash-verified-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:4px; }
.dash-verified-badge.verified { background:var(--green2); color:var(--green); }
.dash-verified-badge.pending { background:#fff3cd; color:#856404; }
.upload-section { background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius-lg); padding:48px 32px; text-align:center; margin-bottom:32px; transition:var(--transition); cursor:pointer; }
.upload-section:hover { border-color:var(--accent); background:var(--surface2); }
.upload-section.dragover { border-color:var(--accent); background:var(--accent-glow); }
.upload-icon { font-size:48px; margin-bottom:12px; }
.upload-title { font-size:16px; font-weight:600; margin-bottom:6px; }
.upload-desc { font-size:13px; color:var(--text3); margin-bottom:16px; line-height:1.6; }
.upload-formats { font-size:11px; color:var(--text3); }
.upload-formats strong { color:var(--text2); }
.uploaded-files { margin-bottom:32px; }
.uploaded-file { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:8px; }
.uf-info { display:flex; align-items:center; gap:12px; }
.uf-icon { font-size:24px; }
.uf-name { font-size:13px; font-weight:500; }
.uf-meta { font-size:11px; color:var(--text3); }
.uf-status { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:500; }
.uf-status.processing { background:#fff3cd; color:#856404; }
.uf-status.done { background:var(--green2); color:var(--green); }

@media(max-width:640px) {
  .topbar-nav { display:none; }
  .hero-kanji { font-size:36px; }
  .hero.has-results .hero-kanji { font-size:22px; }
  .search-box input { height:52px; font-size:15px; }
  .bc-header { padding:20px 18px 0; }
  .bc-body { padding:16px 18px; }
  .bc-info-grid { grid-template-columns:1fr; }
  .bc-cta { padding:16px 18px; }
  .bc-cta-actions { flex-direction:column; }
  .register-card { padding:24px; }
  .topbar-user-name { display:none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" onclick="goHome()">酒蔵 <span class="logo-mark">PLATFORM</span></div>
    <nav class="topbar-nav" id="topbar-nav">
      <a class="active" id="nav-search" onclick="navTo('search')"></a>
      <a id="nav-register" onclick="navTo('register')" style="display:none"></a>
      <a id="nav-dashboard" onclick="navTo('dashboard')" style="display:none"></a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="it" onclick="switchLang('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>
    </div>
    <div class="topbar-user" id="topbar-user">
      <span class="topbar-user-name" id="topbar-user-name"></span>
      <button class="topbar-user-btn" id="btn-logout" onclick="logout()"></button>
    </div>
  </div>
</div>

<!-- PAGE: SEARCH -->
<div class="screen active" id="page-search">
  <div class="hero" id="hero">
    <div class="hero-kanji" id="hero-kanji"></div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="search-box">
      <input type="text" id="search-input" autocomplete="off" onkeydown="if(event.key==='Enter')startSearch()">
      <button class="search-go" id="search-go-btn" onclick="startSearch()">→</button>
    </div>
    <div class="search-hint" id="search-hint"></div>
    <div class="inline-result" id="inline-result" style="display:none"></div>
  </div>
</div>

<!-- PAGE: REGISTER -->
<div class="screen" id="page-register">
  <div class="register-page">
    <div class="register-card">
      <div class="reg-header"><h2 id="reg-title"></h2><p id="reg-desc"></p></div>
      <div class="reg-brewery-mini" id="reg-brewery"></div>
      <div class="reg-form" id="reg-form">
        <label id="lbl-name"></label>
        <input type="text" id="inp-name">
        <label id="lbl-email"></label>
        <input type="email" id="inp-email">
        <div class="domain-hint" id="domain-hint"></div>
        <label id="lbl-pass"></label>
        <input type="password" id="inp-pass">
        <button class="btn btn-primary btn-lg btn-full" style="margin-top:24px" onclick="register()" id="btn-register"></button>
      </div>
      <div class="verification-sent" id="verification-sent">
        <div class="icon">📧</div>
        <h3 id="verif-title"></h3>
        <p id="verif-desc"></p>
        <button class="btn btn-primary btn-lg" style="margin-top:20px" onclick="enterDashboard()" id="btn-enter-dash"></button>
      </div>
    </div>
  </div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="screen" id="page-dashboard">
  <div class="dashboard">
    <div class="dash-header">
      <div>
        <div class="dash-brewery" id="dash-name"></div>
        <div class="dash-verified-badge" id="dash-badge"></div>
      </div>
    </div>
    <div class="upload-section" id="upload-area"
         onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="event.preventDefault();this.classList.remove('dragover');handleFiles(event.dataTransfer.files)">
      <div class="upload-icon">📄</div>
      <div class="upload-title" id="upload-title"></div>
      <div class="upload-desc" id="upload-desc"></div>
      <div class="upload-formats" id="upload-formats"></div>
      <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.doc,.docx,.jpg,.jpeg,.png" style="display:none" onchange="handleFiles(this.files)">
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
  </div>
</div>

// ==================== SEARCH ====================
async function startSearch(){
  if(state.searching)return;
  const name=document.getElementById('search-input').value.trim();
  if(!name)return;

  state.searching=true;
  const hero=document.getElementById('hero');
  const ir=document.getElementById('inline-result');
  const inp=document.getElementById('search-input');
  const goBtn=document.getElementById('search-go-btn');
  const hint=document.getElementById('search-hint');

  hero.classList.add('has-results');
  hint.style.display='none';
  inp.disabled=true; goBtn.disabled=true;
  ir.style.display='block';

  function setStatus(text,step){
    ir.innerHTML=`<div class="search-status"><div class="dot"></div><div><div>${esc(text)}</div><div class="search-step">${esc(step)}</div></div></div>`;
  }

  // Step 1: Geocode (Nominatim)
  setStatus(t('searching'), t('step_geo'));
  const geo = await geocodeLookup(name);
  let domain='', displayName=name, address='', prefecture='', lat=null, lng=null;
  if(geo){
    displayName=geo.displayName||name;
    address=geo.address||'';
    prefecture=geo.prefecture||'';
    lat=geo.lat; lng=geo.lng;
  }

  // Step 2: Wikipedia (company info + history)
  setStatus(t('searching'), t('step_wiki'));
  const wiki = await wikiLookup(name);

  // Step 3: AI search for products + company data (or basic domain guess)
  setStatus(t('searching'), t('step_products'));
  let aiData = null;
  if(state.apiKey){
    aiData = await aiSearch(name);
  }

  // Try domain guess if we don't have one
  if(!domain){
    // From AI data
    if(aiData?.company?.website) domain=aiData.company.website;
    // From wiki
    else if(wiki?.website) domain=wiki.website;
    // Guess: name.co.jp
    else {
      const slug=name.toLowerCase().replace(/[^a-z0-9]/g,'');
      if(slug.length>2) domain=slug+'.co.jp';
    }
  }

  state.searching=false;
  inp.disabled=false; goBtn.disabled=false;

  // Build result
  const company = {
    name_jp: aiData?.company?.name_jp || wiki?.name_jp || displayName,
    name_en: aiData?.company?.name_en || wiki?.name_en || '',
    website: aiData?.company?.website || wiki?.website || domain,
    prefecture: aiData?.company?.prefecture || prefecture || wiki?.prefecture || '',
    address: aiData?.company?.address || address || '',
    phone: aiData?.company?.phone || '',
    founded: aiData?.company?.founded || wiki?.founded || '',
    history: wiki?.extract || aiData?.company?.history || '',
  };
  const productCount = aiData?.products?.length || aiData?.product_count || 0;
  const sources = aiData?.sources || [];

  if(!company.name_jp && !company.website && !geo && !wiki){
    ir.innerHTML=`<div class="search-status" style="border-color:var(--border2)"><div>${esc(t('not_found'))}</div></div>`;
    setTimeout(()=>{ir.style.display='none';hero.classList.remove('has-results');hint.style.display='';},4000);
    return;
  }

  state.foundData={company, productCount, sources, _geo:geo?{lat,lng}:null, _products:aiData?.products||[]};
  showBreweryCard(state.foundData);
}

  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/\/$/,'');

  const mapHtml=geo&&geo.lat?`<div class="bc-map"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${geo.lng-0.006},${geo.lat-0.004},${geo.lng+0.006},${geo.lat+0.004}&layer=mapnik&marker=${geo.lat},${geo.lng}" width="100%" height="140" style="border:0" loading="lazy"></iframe></div>`:'';

  const historyHtml=c.history?`<div class="bc-history">${esc(c.history)}</div>`:'';

  const infoItems=[];

  if(c.phone) infoItems.push({icon:'📞',label:t('phone_label'),value:c.phone});

  const infoGrid=infoItems.length?`<div class="bc-info-grid">${infoItems.map(i=>`
    <div class="bc-info-item"><div class="icon">${i.icon}</div><div><div class="bc-info-label">${esc(i.label)}</div><div class="bc-info-value">${esc(i.value)}</div></div></div>`).join('')}</div>`:'';

  const productsHtml=pc>0?`
    <div class="bc-products-badge">
      <div class="bc-products-number">${pc}</div>
      <div><div class="bc-products-label">${esc(t('products_found'))}</div><div class="bc-products-sublabel">${esc(t('products_sublabel'))}</div></div>
    </div>`:'';

  const srcTags=sources.length?sources.map(s=>`<span class="bc-source-tag">${esc(s)}</span>`).join(''):'';
  const sourcesHtml=(sources.length||website)?`<div class="bc-sources">${website?`<span class="bc-source-tag">${esc(website)}</span>`:''}${srcTags}</div>`:'';

  ir.innerHTML=`
    <div class="brewery-card">
      <div class="bc-header">
        <div class="bc-logo">${logoHtml}</div>
        <div class="bc-title">
          <div class="bc-name-jp">${esc(c.name_jp)}</div>
          ${c.name_en?`<div class="bc-name-en">${esc(c.name_en)}</div>`:''}
        </div>

        ${website?`<a class="bc-website" href="https://${esc(website)}" target="_blank" rel="noopener">🌐 ${esc(website)}</a>`:''}
        ${infoGrid}

      </div>
      ${mapHtml}
      ${sourcesHtml}
      <div class="bc-cta">
        <div class="bc-cta-text">${esc(t('found_confirm'))}</div>
        <div class="bc-cta-actions">

          <button class="bc-retry" onclick="resetSearch()">${esc(t('btn_not_me'))}</button>

// ==================== WEB APIS ====================

async function geocodeLookup(name){
  try{
    const qs=[name+' 酒造',name+' sake brewery',name];
    for(const q of qs){
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=3&accept-language=ja`,{headers:{'User-Agent':'SakePlatform/2.0'}});
      if(!r.ok)continue;
      const res=await r.json();
      if(!res.length)continue;
      const b=res.find(r=>r.address?.country_code==='jp')||res[0];
      const a=b.address||{};
      return{displayName:b.name||'',address:b.display_name||'',lat:+b.lat,lng:+b.lon,prefecture:a.province||a.state||''};
    }
  }catch(e){}
  return null;
}

async function wikiLookup(name){
  try{
    // Search Japanese Wikipedia
    const searchTerms=[name+'酒造',name+' 酒造',name];
    for(const term of searchTerms){
      const sr=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*&srlimit=3`);
      if(!sr.ok)continue;
      const sd=await sr.json();
      const results=sd.query?.search||[];
      // Find a brewery-related article
      const article=results.find(r=>r.snippet.includes('酒')||r.snippet.includes('醸造')||r.snippet.includes('蔵'))||results[0];
      if(!article)continue;
      // Get extract
      const er=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(article.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
      if(!er.ok)continue;
      const ed=await er.json();
      const pages=ed.query?.pages||{};
      const page=Object.values(pages)[0];
      if(!page||page.missing!==undefined)continue;
      let extract=(page.extract||'').substring(0,400);
      if(extract.length===400)extract=extract.substring(0,extract.lastIndexOf('。')+1)||extract+'…';
      // Try to extract info from text
      const foundedMatch=extract.match(/(\d{4})年.*?(創業|設立|開業)/)||extract.match(/(創業|設立|開業).*?(\d{4})年/);
      const founded=foundedMatch?(foundedMatch[1].match(/\d{4}/)?.[0]||foundedMatch[2]):'';
      return{extract,founded,name_jp:article.title};
    }
    // Try English Wikipedia too
    const enr=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name+' sake brewery')}&format=json&origin=*&srlimit=3`);
    if(enr.ok){
      const end=await enr.json();
      const enResults=end.query?.search||[];
      const enArticle=enResults.find(r=>r.snippet.toLowerCase().includes('sake')||r.snippet.toLowerCase().includes('brew'))||enResults[0];
      if(enArticle){
        const er2=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(enArticle.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`);
        if(er2.ok){
          const ed2=await er2.json();
          const pages2=ed2.query?.pages||{};
          const page2=Object.values(pages2)[0];
          if(page2&&page2.missing===undefined){
            let ext=(page2.extract||'').substring(0,400);
            if(ext.length===400)ext=ext.substring(0,ext.lastIndexOf('.')+1)||ext+'…';
            return{extract:ext,name_en:enArticle.title};
          }
        }
      }
    }
  }catch(e){}
  return null;
}

async function aiSearch(name){
  try{
    const p=`You are a comprehensive sake database. Search for the Japanese sake brewery "${name}".

Find ALL information from EVERY source you know: the brewery's official website, international importers (Sake Company, Tippsy Sake, Sake Inn, World Sake Imports, JFC, Mutual Trading, Southern Glazers), sake databases (Saketime, Sake-World, Rate Beer), retailers worldwide (Wine-Searcher, Vivino, Total Wine), competition results (IWC, Kura Master, Joy of Sake), and export catalogs.

Return ONLY valid JSON:
{
  "company":{
    "name_jp":"Japanese name",
    "name_en":"English name",
    "prefecture":"Prefecture in Japanese",
    "address":"Full address",
    "phone":"Phone number",
    "website":"domain.co.jp",
    "founded":"Year",
    "history":"2-3 sentence description of the brewery's history and philosophy"
  },
  "products":[{"name_jp":"","name_en":"","type":""}],
  "product_count":0,
  "sources":["source1.com","source2.com"]
}

CRITICAL: Find as MANY products as possible from ALL international sources. Include every variation, seasonal release, limited edition, collaboration, and export-only product. The product_count must reflect the TOTAL number of unique products found across all sources.`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content:p}]})});
    if(!r.ok)return null;
    const d=await r.json();
    const txt=d.content[0].text;
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m)return null;
    const parsed=JSON.parse(m[0]);
    // Ensure product_count reflects actual products array if present
    if(parsed.products?.length && !parsed.product_count) parsed.product_count=parsed.products.length;
    if(parsed.product_count < parsed.products?.length) parsed.product_count=parsed.products.length;
    return parsed;
  }catch(e){return null;}
}

function register(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value.trim();
  if(!name||!email||!pass)return;
  const c=state.brewery.company;
  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();
  const d=(email.split('@')[1]||'').toLowerCase();
  const dm=d&&website&&d===website;
  state.user={name,email,domainMatch:dm};
  localStorage.setItem('sp_user',JSON.stringify(state.user));
  document.getElementById('reg-form').style.display='none';
  document.getElementById('verification-sent').style.display='';
  document.getElementById('verif-title').textContent=t('verif_title');
  document.getElementById('verif-desc').textContent=t('verif_desc').replace('{email}',email);
}

function enterDashboard(){
  if(!state.brewery||!state.user){showPage('search');return;}
  const c=state.brewery.company;
  document.getElementById('dash-name').innerHTML=esc(c.name_jp)+(state.user.domainMatch?` <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#34a853;color:#fff;font-size:12px;align-items:center;justify-content:center">✓</span>`:'');
  const b=document.getElementById('dash-badge');
  if(state.user.domainMatch){b.className='dash-verified-badge verified';b.textContent=t('verified_owner');}
  else{b.className='dash-verified-badge pending';b.textContent=t('pending_verif');}
  renderUploaded();
  showPage('dashboard');
}

// ==================== DASHBOARD ====================
function handleFiles(files){
  for(const f of files){
    state.files.push({name:f.name,size:(f.size/1024).toFixed(0)+'KB',type:f.name.split('.').pop().toUpperCase(),status:'processing'});
    setTimeout(()=>{
      const entry=state.files.find(e=>e.name===f.name&&e.status==='processing');
      if(entry)entry.status='done';
      localStorage.setItem('sp_files',JSON.stringify(state.files));
      renderUploaded();
    },2000+Math.random()*2000);
  }
  localStorage.setItem('sp_files',JSON.stringify(state.files));
  renderUploaded();
}

function renderUploaded(){
  const el=document.getElementById('uploaded-files');
  if(!state.files.length){el.innerHTML='';return;}
  const ic={PDF:'📕',XLSX:'📗',XLS:'📗',CSV:'📊',DOCX:'📘',DOC:'📘',JPG:'🖼',JPEG:'🖼',PNG:'🖼'};
  el.innerHTML=state.files.map(f=>`<div class="uploaded-file"><div class="uf-info"><div class="uf-icon">${ic[f.type]||'📄'}</div><div><div class="uf-name">${esc(f.name)}</div><div class="uf-meta">${esc(f.size)} · ${esc(f.type)}</div></div></div><div class="uf-status ${f.status}">${f.status==='done'?esc(t('upload_done')):esc(t('upload_processing'))}</div></div>`).join('');
}

function logout(){
  state.user=null;state.brewery=null;state.files=[];state.foundData=null;
  localStorage.removeItem('sp_user');localStorage.removeItem('sp_brewery');localStorage.removeItem('sp_files');
  resetSearch();showPage('search');
}

// ==================== INIT ====================
applyLang();
if(state.user&&state.brewery) enterDashboard();
else showPage('search');
