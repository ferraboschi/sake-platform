<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --bg2: #f4f4f5;
  --bg3: #e4e4e7;
  --surface: #ffffff;
  --surface2: #f9f9fa;
  --border: #e4e4e7;
  --border2: #d4d4d8;
  --text: #09090b;
  --text2: #3f3f46;
  --text3: #a1a1aa;
  --accent: #18181b;
  --accent-hover: #27272a;
  --accent-glow: rgba(24,24,27,0.04);
  --gold: #b8860b;
  --gold-soft: rgba(184,134,11,0.08);
  --green: #16a34a;
  --green-soft: rgba(22,163,74,0.06);
  --orange: #ea580c;
  --orange-soft: rgba(234,88,12,0.06);
  --blue: #2563eb;
  --blue-soft: rgba(37,99,235,0.06);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
  --font-serif: 'Noto Serif JP', serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.06);
  --transition: 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

/* ===== TOPBAR ===== */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:56px; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(255,255,255,0.82); backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
}
.topbar-left { display:flex; align-items:center; gap:32px; }
.topbar-logo {
  font-family:var(--font); font-size:15px; font-weight:700; color:var(--text);
  letter-spacing:-0.3px; display:flex; align-items:center; gap:8px;
  cursor:pointer; white-space:nowrap; user-select:none;
}
.topbar-logo .logo-mark { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.3px; }
.topbar-logo .logo-jp { font-family:var(--font-serif); font-size:14px; font-weight:500; color:var(--text3); margin-left:4px; }
.topbar-nav { display:flex; gap:2px; }
.topbar-nav a {
  color:var(--text3); font:500 13px var(--font);
  padding:6px 12px; border-radius:6px; cursor:pointer;
  transition:var(--transition); text-decoration:none; letter-spacing:-0.1px;
}
.topbar-nav a:hover { color:var(--text2); background:var(--bg2); }
.topbar-nav a.active { color:var(--text); background:var(--bg2); }
.topbar-right { display:flex; align-items:center; gap:8px; }
.lang-switcher {
  display:flex; gap:1px; background:var(--bg2);
  border-radius:8px; padding:2px; border:1px solid var(--border);
}
.lang-btn {
  background:none; border:none; color:var(--text3);
  font:600 10px var(--font); padding:5px 10px; border-radius:6px;
  cursor:pointer; transition:var(--transition); letter-spacing:0.5px;
}
.lang-btn:hover { color:var(--text2); }
.lang-btn.active { background:var(--text); color:#fff; }
.topbar-user {
  display:none; align-items:center; gap:8px;
  margin-left:8px; padding-left:12px; border-left:1px solid var(--border);
}
.topbar-user-name { color:var(--text2); font:500 13px var(--font); }
.topbar-user-btn {
  background:var(--bg2); border:1px solid var(--border); color:var(--text3);
  cursor:pointer; font:500 12px var(--font); padding:5px 12px;
  border-radius:6px; transition:var(--transition);
}
.topbar-user-btn:hover { color:var(--text); border-color:var(--border2); }

.screen { display:none; min-height:100vh; padding-top:56px; }
.screen.active { display:block; }

/* ===== BUTTONS ===== */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 20px; border:none; border-radius:var(--radius-sm);
  font:500 14px var(--font); cursor:pointer; transition:var(--transition);
  text-decoration:none; letter-spacing:-0.1px;
}
.btn-primary { background:var(--text); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-lg { padding:14px 32px; font-size:15px; border-radius:var(--radius); }
.btn-full { width:100%; }
.btn-gold { background:var(--text); color:#fff; }
.btn-gold:hover { background:var(--accent-hover); }
.btn-outline { background:transparent; color:var(--text); border:1px solid var(--border2); }
.btn-outline:hover { background:var(--bg2); border-color:var(--text3); }

/* ===== SEARCH / HERO ===== */
.hero {
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  min-height:calc(100vh - 56px); padding:140px 24px 60px;
  transition:padding 0.5s cubic-bezier(0.16,1,0.3,1);
}
.hero.has-results { padding-top:48px; }
.hero-kanji {
  font-family:var(--font-serif); font-size:56px; font-weight:700;
  color:var(--text); letter-spacing:4px; margin-bottom:12px;
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
}
.hero.has-results .hero-kanji { font-size:28px; letter-spacing:2px; margin-bottom:6px; }
.hero-sub {
  font-size:13px; font-weight:500; color:var(--text3);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:56px;
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
}
.hero.has-results .hero-sub { font-size:11px; margin-bottom:20px; }

.search-box { position:relative; width:100%; max-width:480px; }
.search-box input {
  width:100%; height:56px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:0 20px; font:400 16px var(--font);
  color:var(--text); outline:none; transition:var(--transition);
  box-shadow:var(--shadow-sm);
}
.search-box input::placeholder { color:var(--text3); }
.search-box input:focus {
  border-color:var(--text3); box-shadow:0 0 0 3px var(--accent-glow), var(--shadow);
}

.search-hint {
  margin-top:24px; font-size:13px; color:var(--text3);
  max-width:480px; text-align:center; line-height:1.7; letter-spacing:-0.1px;
}
.search-hint strong { color:var(--text2); font-weight:500; }

/* ===== PROGRESS TIMELINE ===== */
.inline-result { width:100%; max-width:520px; margin-top:28px; }
.progress-timeline {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px 24px;
  box-shadow:var(--shadow-sm);
}
.pt-step { display:flex; align-items:flex-start; gap:14px; padding:8px 0; position:relative; }
.pt-step:not(:last-child) { padding-bottom:14px; }
.pt-step:not(:last-child)::after {
  content:''; position:absolute; left:11px; top:30px; bottom:0;
  width:1.5px; background:var(--bg3);
}
.pt-step.done:not(:last-child)::after { background:var(--green); }
.pt-step.active:not(:last-child)::after { background:linear-gradient(var(--text3),var(--bg3)); }
.pt-icon {
  width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; flex-shrink:0; transition:var(--transition);
  border:1.5px solid var(--bg3); color:var(--text3); background:var(--surface);
}
.pt-step.active .pt-icon {
  border-color:var(--text); color:var(--text); background:var(--accent-glow);
  animation:pulse 1.8s ease infinite;
}
.pt-step.done .pt-icon { border-color:var(--green); color:#fff; background:var(--green); font-size:10px; }
@keyframes pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(24,24,27,0.12)}
  50%{box-shadow:0 0 0 6px rgba(24,24,27,0)}
}
.pt-label { font-size:13px; font-weight:500; color:var(--text2); letter-spacing:-0.1px; }
.pt-step.active .pt-label { color:var(--text); }
.pt-step.done .pt-label { color:var(--green); }
.pt-detail { font-size:12px; color:var(--text3); margin-top:2px; }
.pt-step.done .pt-detail { color:var(--green); }

/* ===== CANDIDATE LIST (multiple results) ===== */
.candidate-list {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow);
  overflow:hidden; animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1);
}
.candidate-list-title {
  padding:16px 20px 12px; font-size:13px; font-weight:600;
  color:var(--text2); border-bottom:1px solid var(--border);
}
.candidate-item {
  display:flex; align-items:center; gap:14px;
  padding:14px 20px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:var(--transition);
}
.candidate-item:last-child { border-bottom:none; }
.candidate-item:hover { background:var(--bg2); }
.candidate-logo {
  width:36px; height:36px; border-radius:var(--radius-sm);
  background:var(--bg2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0; font-size:18px;
}
.candidate-logo img { width:100%; height:100%; object-fit:contain; }
.candidate-info { flex:1; min-width:0; }
.candidate-name { font-size:14px; font-weight:600; letter-spacing:-0.1px; }
.candidate-meta { font-size:12px; color:var(--text3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.candidate-arrow { color:var(--text3); font-size:14px; flex-shrink:0; }

/* ===== BREWERY CARD ===== */
.brewery-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); box-shadow:var(--shadow);
  animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1); overflow:hidden;
}
@keyframes slideUp {
  from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)}
}
.bc-header { display:flex; align-items:center; gap:16px; padding:28px 28px 0; }
.bc-logo {
  width:52px; height:52px; border-radius:var(--radius);
  background:var(--bg2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
}
.bc-logo img { width:100%; height:100%; object-fit:contain; }
.bc-logo-fallback { font-size:26px; }
.bc-title { flex:1; }
.bc-name-jp {
  font-family:var(--font-serif); font-size:22px; font-weight:600;
  line-height:1.3; letter-spacing:-0.3px;
}
.bc-name-en { font-size:13px; color:var(--text3); margin-top:2px; font-weight:400; }
.bc-body { padding:20px 28px; }
.bc-website {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; background:var(--bg2); border:1px solid var(--border);
  border-radius:20px; font-size:13px; font-weight:500;
  color:var(--text2); margin-bottom:16px; text-decoration:none;
  transition:var(--transition);
}
.bc-website:hover { background:var(--bg3); color:var(--text); }
.bc-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }
.bc-info-item { display:flex; align-items:flex-start; gap:8px; }
.bc-info-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.bc-info-value { font-size:13px; color:var(--text); margin-top:1px; }
.bc-history {
  font-size:13px; color:var(--text2); line-height:1.8; margin-bottom:18px;
  padding:16px 18px; background:var(--surface2); border-radius:var(--radius-sm);
  border-left:2px solid var(--gold);
}
.bc-products-badge {
  display:flex; align-items:center; gap:12px;
  padding:16px 20px; background:var(--green-soft);
  border:1px solid rgba(22,163,74,0.12); border-radius:var(--radius); margin-bottom:4px;
}
.bc-products-number { font-size:28px; font-weight:800; color:var(--green); letter-spacing:-1px; }
.bc-products-label { font-size:13px; color:var(--green); font-weight:600; line-height:1.3; }
.bc-products-sublabel { font-size:11px; color:var(--text3); font-weight:400; }

/* Multilingual hint */
.bc-lang-hint {
  display:flex; align-items:center; gap:10px;
  padding:14px 18px; background:var(--blue-soft);
  border:1px solid rgba(37,99,235,0.12); border-radius:var(--radius);
  margin-top:12px; margin-bottom:4px;
}
.bc-lang-hint-icon { font-size:18px; flex-shrink:0; }
.bc-lang-hint-text { font-size:12px; color:var(--blue); line-height:1.5; }
.bc-lang-hint-text strong { font-weight:600; }

.bc-map { border-top:1px solid var(--border); }
.bc-sources {
  padding:12px 28px; background:var(--surface2); border-top:1px solid var(--border);
  font-size:10px; color:var(--text3); display:flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.bc-source-tag { padding:2px 8px; background:var(--bg2); border-radius:10px; font-weight:500; }
.bc-cta { padding:24px 28px; border-top:1px solid var(--border); text-align:center; }
.bc-cta-text { font-size:15px; color:var(--text2); margin-bottom:16px; font-weight:500; }
.bc-cta-actions { display:flex; gap:12px; justify-content:center; align-items:center; }
.bc-retry {
  font-size:13px; color:var(--text3); background:none; border:none;
  cursor:pointer; padding:8px 14px; transition:var(--transition);
}
.bc-retry:hover { color:var(--text); }

/* ===== SETTINGS MODAL ===== */
.settings-btn {
  background:none; border:1px solid var(--border); color:var(--text3);
  width:32px; height:32px; border-radius:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:var(--transition); flex-shrink:0;
}
.settings-btn:hover { color:var(--text); border-color:var(--border2); background:var(--bg2); }
.settings-btn svg { width:16px; height:16px; }
.settings-overlay {
  position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease;
}
.settings-overlay.active { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.settings-modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
  width:100%; max-width:440px; margin:24px;
  animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
}
.settings-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 24px; border-bottom:1px solid var(--border);
}
.settings-title { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
.settings-close {
  background:none; border:none; color:var(--text3); cursor:pointer;
  width:28px; height:28px; border-radius:6px; display:flex;
  align-items:center; justify-content:center; transition:var(--transition);
  font-size:18px;
}
.settings-close:hover { color:var(--text); background:var(--bg2); }
.settings-body { padding:24px; }
.settings-field { margin-bottom:20px; }
.settings-field:last-child { margin-bottom:0; }
.settings-label {
  font-size:12px; font-weight:600; color:var(--text2);
  text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:block;
}
.settings-desc {
  font-size:12px; color:var(--text3); line-height:1.6; margin-bottom:10px;
}
.settings-input-wrap { position:relative; }
.settings-input {
  width:100%; height:44px; background:var(--bg2);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:0 40px 0 14px; font:400 13px var(--font);
  color:var(--text); outline:none; transition:var(--transition);
}
.settings-input::placeholder { color:var(--text3); }
.settings-input:focus { border-color:var(--text3); background:var(--surface); box-shadow:0 0 0 3px var(--accent-glow); }
.settings-toggle-vis {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--text3); cursor:pointer;
  padding:4px; border-radius:4px; transition:var(--transition);
}
.settings-toggle-vis:hover { color:var(--text); }
.settings-status {
  display:flex; align-items:center; gap:6px; margin-top:10px;
  font-size:12px; font-weight:500; padding:8px 12px;
  border-radius:var(--radius-sm);
}
.settings-status.ok { background:var(--green-soft); color:var(--green); }
.settings-status.empty { background:var(--orange-soft); color:var(--orange); }
.settings-footer {
  padding:16px 24px; border-top:1px solid var(--border);
  display:flex; justify-content:flex-end; gap:8px;
}
.settings-link {
  font-size:12px; color:var(--blue); text-decoration:none;
  font-weight:500; transition:var(--transition);
}
.settings-link:hover { text-decoration:underline; }

/* ===== CLAIM / REGISTER PAGE ===== */
.claim-page { max-width:520px; margin:0 auto; padding:48px 24px 80px; }
.claim-breadcrumb {
  display:flex; align-items:center; gap:8px; font-size:12px;
  color:var(--text3); margin-bottom:32px;
}
.claim-breadcrumb a { color:var(--text2); cursor:pointer; text-decoration:none; font-weight:500; }
.claim-breadcrumb a:hover { color:var(--text); }
.claim-breadcrumb .sep { color:var(--border2); }

.claim-brewery {
  display:flex; align-items:center; gap:14px;
  padding:16px 20px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:28px; box-shadow:var(--shadow-sm);
}
.claim-brewery-logo {
  width:40px; height:40px; border-radius:var(--radius-sm);
  background:var(--bg2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
}
.claim-brewery-logo img { width:100%; height:100%; object-fit:contain; }
.claim-brewery-name { font-family:var(--font-serif); font-size:17px; font-weight:600; }
.claim-brewery-site { font-size:12px; color:var(--text3); margin-top:1px; }

.claim-section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:28px; margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.claim-section-title { font-size:16px; font-weight:600; margin-bottom:8px; letter-spacing:-0.2px; }
.claim-section-desc { font-size:14px; color:var(--text3); line-height:1.7; margin-bottom:24px; }

/* Verification methods */
.verif-methods { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.verif-method {
  display:flex; align-items:flex-start; gap:14px;
  padding:16px 18px; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius-sm); transition:var(--transition);
}
.verif-method.recommended { border-color:var(--green); background:var(--green-soft); }
.verif-method-icon {
  width:32px; height:32px; border-radius:var(--radius-sm);
  background:var(--bg2); display:flex; align-items:center;
  justify-content:center; font-size:16px; flex-shrink:0;
}
.verif-method.recommended .verif-method-icon { background:var(--green); color:#fff; font-size:14px; }
.verif-method-title { font-size:13px; font-weight:600; letter-spacing:-0.1px; }
.verif-method-desc { font-size:12px; color:var(--text3); margin-top:3px; line-height:1.6; }
.verif-method-badge {
  display:inline-flex; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:600; margin-top:6px;
}
.verif-method-badge.auto { background:var(--green-soft); color:var(--green); }
.verif-method-badge.manual { background:var(--orange-soft); color:var(--orange); }

/* Form */
.claim-form label {
  display:block; font-size:12px; font-weight:600; color:var(--text2);
  margin:16px 0 6px; letter-spacing:-0.1px;
}
.claim-form label:first-child { margin-top:0; }
.claim-form input {
  width:100%; height:44px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:0 14px; font:400 14px var(--font); color:var(--text);
  outline:none; transition:var(--transition);
}
.claim-form input:focus { border-color:var(--text3); box-shadow:0 0 0 3px var(--accent-glow); }
.domain-match-alert {
  margin-top:12px; padding:12px 16px; border-radius:var(--radius-sm);
  font-size:13px; line-height:1.5; display:none; font-weight:500;
}
.domain-match-alert.match { background:var(--green-soft); border:1px solid rgba(22,163,74,0.15); color:var(--green); }
.domain-match-alert.no-match { background:var(--orange-soft); border:1px solid rgba(234,88,12,0.15); color:var(--orange); }

/* Email sent */
.email-sent-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:40px 32px; text-align:center;
  display:none; box-shadow:var(--shadow-sm);
}
.email-sent-icon { font-size:48px; margin-bottom:16px; }
.email-sent-title { font-size:20px; font-weight:700; margin-bottom:10px; letter-spacing:-0.3px; }
.email-sent-desc { font-size:14px; color:var(--text3); line-height:1.7; margin-bottom:24px; }

/* ===== DASHBOARD ===== */
.dashboard { max-width:720px; margin:0 auto; padding:48px 24px 80px; }
.dash-header {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:16px; margin-bottom:36px;
}
.dash-brewery {
  font-family:var(--font-serif); font-size:26px; font-weight:700;
  display:flex; align-items:center; gap:10px; letter-spacing:-0.3px;
}
.dash-verified-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; margin-top:4px;
}
.dash-verified-badge.verified { background:var(--green-soft); color:var(--green); }
.dash-verified-badge.pending { background:#fef3c7; color:#92400e; }
.upload-section {
  background:var(--surface); border:1.5px dashed var(--border2);
  border-radius:var(--radius-lg); padding:56px 32px; text-align:center;
  margin-bottom:32px; transition:var(--transition); cursor:pointer;
}
.upload-section:hover { border-color:var(--text3); background:var(--surface2); }
.upload-section.dragover { border-color:var(--text); background:var(--accent-glow); }
.upload-icon { font-size:40px; margin-bottom:16px; opacity:0.7; }
.upload-title { font-size:17px; font-weight:600; margin-bottom:8px; letter-spacing:-0.2px; }
.upload-desc { font-size:14px; color:var(--text3); margin-bottom:20px; line-height:1.7; }
.upload-formats { font-size:12px; color:var(--text3); }
.upload-formats strong { color:var(--text2); font-weight:500; }
.uploaded-files { margin-bottom:32px; }
.uploaded-file {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:8px;
}
.uf-info { display:flex; align-items:center; gap:12px; }
.uf-icon { font-size:22px; opacity:0.8; }
.uf-name { font-size:13px; font-weight:500; }
.uf-meta { font-size:12px; color:var(--text3); }
.uf-status { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.uf-status.processing { background:#fef3c7; color:#92400e; }
.uf-status.done { background:var(--green-soft); color:var(--green); }

/* ===== DEMO BUTTONS ===== */
.demo-links { margin-top:20px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.demo-btn {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:6px 16px; font:500 12px var(--font);
  color:var(--text2); cursor:pointer; transition:var(--transition);
  letter-spacing:-0.1px;
}
.demo-btn:hover { border-color:var(--text3); color:var(--text); background:var(--bg2); }

/* ===== RESPONSIVE ===== */
@media(max-width:640px) {
  .topbar-nav { display:none; }
  .hero { padding:100px 20px 40px; }
  .hero-kanji { font-size:40px; }
  .hero.has-results .hero-kanji { font-size:22px; }
  .search-box input { height:52px; font-size:15px; }
  .search-box { max-width:100%; }
  .inline-result { max-width:100%; }
  .bc-header { padding:20px 20px 0; }
  .bc-body { padding:18px 20px; }
  .bc-info-grid { grid-template-columns:1fr; }
  .bc-cta { padding:20px; }
  .bc-cta-actions { flex-direction:column; }
  .claim-page { padding:28px 16px 40px; }
  .claim-section { padding:22px; }
  .topbar-user-name { display:none; }
  .dashboard { padding:28px 16px 40px; }
}
</style>

    </div>
    <nav class="topbar-nav" id="topbar-nav">

      <a id="nav-register" onclick="navTo('register')" style="display:none"></a>

  <div class="topbar-right">

      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>

</div>

<!-- PAGE: SEARCH -->
<div class="screen active" id="page-search">
  <div class="hero" id="hero">
    <div class="hero-kanji" id="hero-kanji"></div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="search-box">
      <input type="text" id="search-input" autocomplete="off" oninput="onSearchInput()">
    </div>
    <div class="search-hint" id="search-hint"></div>
    <div id="demo-links" class="demo-links">
      <span style="font-size:12px;color:var(--text3);display:flex;align-items:center" id="demo-label"></span>
    </div>
    <div class="inline-result" id="inline-result" style="display:none"></div>
  </div>
</div>

<!-- PAGE: CLAIM / REGISTER -->
<div class="screen" id="page-register">
  <div class="claim-page">
    <div class="claim-breadcrumb">
      <a onclick="navTo('search')" id="bc-search"></a>
      <span class="sep">→</span>
      <span id="bc-claim"></span>
    </div>

    <div class="claim-brewery" id="claim-brewery"></div>

    <div class="claim-section" id="claim-verification-section">
      <div class="claim-section-title" id="claim-title"></div>
      <div class="claim-section-desc" id="claim-desc"></div>
      <div class="verif-methods" id="verif-methods"></div>
    </div>

    <div class="claim-section" id="claim-form-section">
      <div class="claim-section-title" id="form-title"></div>
      <div class="claim-form" id="claim-form">
        <label id="lbl-name"></label>
        <input type="text" id="inp-name">
        <label id="lbl-email"></label>
        <input type="email" id="inp-email" oninput="checkDomainMatch()">
        <div id="demo-email-hint" style="margin-top:8px;padding:10px 14px;background:var(--accent-glow);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);display:none;cursor:pointer" onclick="fillDemoEmail()"></div>
        <div class="domain-match-alert match" id="domain-match"></div>
        <div class="domain-match-alert no-match" id="domain-no-match"></div>
        <label id="lbl-pass"></label>
        <input type="password" id="inp-pass">
        <button class="btn btn-primary btn-lg btn-full" style="margin-top:28px" onclick="register()" id="btn-register"></button>
      </div>
    </div>

    <div class="email-sent-card" id="email-sent">
      <div class="email-sent-icon">📧</div>
      <div class="email-sent-title" id="email-sent-title"></div>
      <div class="email-sent-desc" id="email-sent-desc"></div>
      <button class="btn btn-primary btn-lg" onclick="enterDashboard()" id="btn-enter-dash"></button>
    </div>
  </div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="screen" id="page-dashboard">
  <div class="dashboard">
    <div class="claim-breadcrumb">
      <a onclick="navTo('search')" id="dash-bc-search"></a>
      <span class="sep">→</span>
      <span id="dash-bc-name"></span>
    </div>
    <div class="dash-header">
      <div>
        <div class="dash-brewery" id="dash-name"></div>
        <div class="dash-verified-badge" id="dash-badge"></div>
      </div>
    </div>
    <div class="upload-section" id="upload-area"
         onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="event.preventDefault();this.classList.remove('dragover');handleFiles(event.dataTransfer.files)">
      <div class="upload-icon">📄</div>
      <div class="upload-title" id="upload-title"></div>
      <div class="upload-desc" id="upload-desc"></div>
      <div class="upload-formats" id="upload-formats"></div>
      <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.doc,.docx,.jpg,.jpeg,.png" style="display:none" onchange="handleFiles(this.files)">
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
  </div>
</div>

const DEBOUNCE_MS=800, MIN_CHARS=3;

function runDemo(name){
  document.getElementById('search-input').value=name;
  document.getElementById('demo-links').style.display='none';
  clearTimeout(state.debounceTimer);
  startSearch();
}

// ---- SEARCH HISTORY ----
function getHistory(){
  try{return JSON.parse(localStorage.getItem('sp_history')||'[]');}catch(e){return [];}
}
function addToHistory(name){
  let h=getHistory().filter(x=>x.toLowerCase()!==name.toLowerCase());
  h.unshift(name);
  if(h.length>8)h=h.slice(0,8);
  localStorage.setItem('sp_history',JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  const container=document.getElementById('demo-links');
  const label=document.getElementById('demo-label');
  const h=getHistory();
  // Remove old buttons (keep the label span)
  container.querySelectorAll('.demo-btn').forEach(b=>b.remove());
  if(!h.length){
    label.style.display='none';
    return;
  }
  label.style.display='flex';
  h.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='demo-btn';
    btn.textContent=name;
    btn.onclick=()=>runDemo(name);
    container.appendChild(btn);
  });
}

function onSearchInput(){
  clearTimeout(state.debounceTimer);
  const val=document.getElementById('search-input').value.trim();
  if(!val && state.foundData){resetSearch();return;}
  if(val===state.lastQuery)return;
  if(val.length<MIN_CHARS)return;
  state.debounceTimer=setTimeout(()=>startSearch(),DEBOUNCE_MS);
}

async function startSearch(){
  const name=document.getElementById('search-input').value.trim();
  if(!name||name.length<MIN_CHARS)return;
  if(name===state.lastQuery&&(state.foundData||state.candidates.length))return;
  if(state.abortCtrl){state.abortCtrl.abort();}
  state.lastQuery=name;
  addToHistory(name);
  state.abortCtrl=new AbortController();
  const signal=state.abortCtrl.signal;

  state.searching=true;state.foundData=null;state.candidates=[];
  const hero=document.getElementById('hero');
  const ir=document.getElementById('inline-result');
  hero.classList.add('has-results');
  document.getElementById('search-hint').style.display='none';
  document.getElementById('demo-links').style.display='none';
  ir.style.display='block';

  function aborted(){return signal.aborted;}

  function renderTimeline(steps){
    if(aborted())return;
    ir.innerHTML=`<div class="progress-timeline">${steps.map((s,i)=>`
      <div class="pt-step ${s.state}">
        <div class="pt-icon">${s.state==='done'?'✓':s.state==='active'?'⟳':(i+1)}</div>
        <div>
          <div class="pt-label">${esc(s.label)}</div>
          <div class="pt-detail">${esc(s.detail)}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  // ---- PATH A: With proxy or API key → AI-first discovery ----
  if(state.proxyUrl||state.apiKey){
    const steps=[
      {label:t('ps_discover'),detail:t('ps_discover_detail'),state:'active'},
      {label:t('ps_verify'),detail:t('ps_verify_detail'),state:'waiting'},
      {label:t('ps_enrich'),detail:t('ps_enrich_detail'),state:'waiting'},
    ];
    renderTimeline(steps);

    try{
    // Step 1: AI Discovery — find ALL breweries with this name
    const aiCandidates=await aiDiscoverAll(name,signal);
    if(aborted())return;
    steps[0]={label:t('ps_discover'),detail:t('ps_found_breweries').replace('{n}',aiCandidates.length),state:'done'};
    steps[1].state='active';
    renderTimeline(steps);

    if(!aiCandidates.length){
      ir.innerHTML=`<div class="progress-timeline"><div style="padding:12px;text-align:center;color:var(--text3);font-size:14px">${esc(t('not_found'))}</div></div>`;
      state.searching=false;
      setTimeout(()=>{ir.style.display='none';hero.classList.remove('has-results');document.getElementById('search-hint').style.display='';document.getElementById('demo-links').style.display='flex';},4000);
      return;
    }

    // Step 2: Verify websites — check each domain via favicon
    const verified=await verifyWebsites(aiCandidates,signal);
    if(aborted())return;
    const verCount=verified.filter(c=>c._siteVerified).length;
    steps[1]={label:t('ps_verify'),detail:t('ps_verified_sites').replace('{n}',verCount).replace('{total}',verified.length),state:'done'};
    steps[2].state='active';
    renderTimeline(steps);

    // Step 3: Enrich with geocode for coordinates
    const enriched=await enrichWithGeo(verified,signal);
    if(aborted())return;
    steps[2]={label:t('ps_enrich'),detail:t('ps_done'),state:'done'};
    renderTimeline(steps);
    state.searching=false;

    await new Promise(r=>setTimeout(r,400));
    if(aborted())return;

    // Convert to our candidate format
    state.candidates=enriched.map(c=>({
      company:{
        name_jp:c.name_jp||'',
        name_en:c.name_en||'',
        website:c.website||'',
        prefecture:c.prefecture||'',
        address:c.address||'',
        phone:c.phone||'',
        founded:c.founded||'',
        history:c.description||'',
        country:c.country||'',
      },
      productCount:c.product_count||0,
      sources:c.sources||[],
      _geo:c._geo||null,
      _products:[],
      _siteVerified:c._siteVerified||false,
    }));

    if(state.candidates.length===1){
      state.foundData=state.candidates[0];
      showBreweryCard(state.foundData);
    } else {
      showCandidateList(state.candidates);
    }

    }catch(e){if(e.name==='AbortError')return;state.searching=false;}

  } else {
    // ---- PATH B: No API key → Nominatim + Wikipedia fallback ----
    const steps=[
      {label:t('ps_geo'),detail:t('ps_geo_detail'),state:'active'},
      {label:t('ps_wiki'),detail:t('ps_wiki_detail'),state:'waiting'},
      {label:t('ps_merge'),detail:t('ps_merge_detail'),state:'waiting'},
    ];
    renderTimeline(steps);

    try{
    const geoResults=await geocodeLookupMulti(name,signal);
    if(aborted())return;
    steps[0]={label:t('ps_geo'),detail:t('ps_found_geo').replace('{n}',geoResults.length),state:'done'};
    steps[1].state='active';
    renderTimeline(steps);

    const wiki=await wikiLookup(name,signal);
    if(aborted())return;
    steps[1]={label:t('ps_wiki'),detail:'✓',state:'done'};
    steps[2].state='active';
    renderTimeline(steps);

    await new Promise(r=>setTimeout(r,300));
    if(aborted())return;

    // Build candidates from geo results
    const candidates=[];
    for(const geo of geoResults){
      candidates.push({
        company:{
          name_jp:geo.displayName||name,name_en:'',website:'',
          prefecture:geo.prefecture||'',address:geo.address||'',
          phone:'',founded:candidates.length===0?(wiki?.founded||''):'',
          history:candidates.length===0?(wiki?.extract||''):'',
          country:geo.country||'',
        },
        productCount:0,sources:[],
        _geo:{lat:geo.lat,lng:geo.lng},_products:[],_siteVerified:false,
      });
    }
    if(!candidates.length&&wiki){
      candidates.push({
        company:{name_jp:wiki.name_jp||name,name_en:wiki.name_en||'',website:'',
          prefecture:'',address:'',phone:'',founded:wiki.founded||'',
          history:wiki.extract||'',country:''},
        productCount:0,sources:[],_geo:null,_products:[],_siteVerified:false,
      });
    }

    steps[2]={label:t('ps_merge'),detail:t('ps_done'),state:'done'};
    renderTimeline(steps);
    state.searching=false;

    if(!candidates.length){
      ir.innerHTML=`<div class="progress-timeline"><div style="padding:12px;text-align:center;color:var(--text3);font-size:14px">${esc(t('not_found'))}</div></div>`;
      setTimeout(()=>{ir.style.display='none';hero.classList.remove('has-results');document.getElementById('search-hint').style.display='';document.getElementById('demo-links').style.display='flex';},4000);
      return;
    }

    await new Promise(r=>setTimeout(r,400));
    if(aborted())return;

    state.candidates=candidates;
    if(candidates.length===1){
      state.foundData=candidates[0];
      showBreweryCard(state.foundData);
    } else {
      showCandidateList(candidates);
    }

    }catch(e){if(e.name==='AbortError')return;state.searching=false;}
  }
}

// Show list of candidates for user to pick from
function showCandidateList(candidates){
  const ir=document.getElementById('inline-result');
  const title=t('candidates_title').replace('{n}',candidates.length);
  ir.innerHTML=`<div class="candidate-list">
    <div class="candidate-list-title">${esc(title)}</div>
    ${candidates.map((c,i)=>{
      const co=c.company;
      const website=(co.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/$/,'');
      const fav=website?`<img src="https://www.google.com/s2/favicons?domain=${website}&sz=64" onerror="this.outerHTML='🏯'">`:'🏯';
      const loc=[co.prefecture,co.country].filter(Boolean).join(', ');
      const verified=c._siteVerified;
      const siteTag=website?(verified
        ?`<span style="color:var(--green);font-size:11px;font-weight:600">✓ ${esc(website)}</span>`
        :`<span style="color:var(--text3);font-size:11px">${esc(website)}</span>`):'';
      const locTag=loc?`<span style="font-size:11px;color:var(--text3)">${esc(loc)}</span>`:'';
      const meta=[siteTag,locTag].filter(Boolean).join(' · ');
      return `<div class="candidate-item" onclick="selectCandidate(${i})">
        <div class="candidate-logo">${fav}</div>
        <div class="candidate-info">
          <div class="candidate-name">${esc(co.name_jp)}${co.name_en&&co.name_en!==co.name_jp?' · '+esc(co.name_en):''}</div>
          <div class="candidate-meta">${meta||esc(co.address||'')}</div>
        </div>
        <div class="candidate-arrow">→</div>
      </div>`;
    }).join('')}
  </div>`;
}

  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/\/$/,'');

  const logo=fav?`<img src="${fav}" onerror="this.parentElement.innerHTML='<div class=bc-logo-fallback>🏯</div>'">`:`<div class="bc-logo-fallback">🏯</div>`;
  const map=geo&&geo.lat?`<div class="bc-map"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${geo.lng-0.006},${geo.lat-0.004},${geo.lng+0.006},${geo.lat+0.004}&layer=mapnik&marker=${geo.lat},${geo.lng}" width="100%" height="140" style="border:0" loading="lazy"></iframe></div>`:'';
  const hist=c.history?`<div class="bc-history">${esc(c.history)}</div>`:'';
  const info=[];
  if(c.country)info.push({l:t('country_label'),v:c.country});

  if(c.phone)info.push({l:t('phone_label'),v:c.phone});
  const grid=info.length?`<div class="bc-info-grid">${info.map(i=>`<div class="bc-info-item"><div><div class="bc-info-label">${esc(i.l)}</div><div class="bc-info-value">${esc(i.v)}</div></div></div>`).join('')}</div>`:'';
  const prods=pc>0?`<div class="bc-products-badge"><div class="bc-products-number">${pc}</div><div><div class="bc-products-label">${esc(t('products_found'))}</div><div class="bc-products-sublabel">${esc(t('products_sublabel'))}</div></div></div>`:'';
  const srcHtml=(sources.length||website)?`<div class="bc-sources">${website?`<span class="bc-source-tag">${esc(website)}</span>`:''}${sources.map(s=>`<span class="bc-source-tag">${esc(s)}</span>`).join('')}</div>`:'';

  const backBtn=state.candidates.length>1?`<button class="bc-retry" onclick="showCandidateList(state.candidates)" style="margin-right:auto">${esc(t('btn_back_results'))}</button>`:'';

  ir.innerHTML=`<div class="brewery-card">
    <div class="bc-header"><div class="bc-logo">${logo}</div><div class="bc-title"><div class="bc-name-jp">${esc(c.name_jp)}</div>${c.name_en?`<div class="bc-name-en">${esc(c.name_en)}</div>`:''}</div></div>
    <div class="bc-body">${website?`<a class="bc-website" href="https://${esc(website)}" target="_blank">🌐 ${esc(website)}</a>`:''}${grid}${hist}${prods}${langHint}</div>
    ${map}${srcHtml}
    <div class="bc-cta"><div class="bc-cta-text">${esc(t('found_confirm'))}</div><div class="bc-cta-actions">${backBtn}<button class="btn btn-primary btn-lg" onclick="confirmBrewery()">${esc(t('btn_confirm'))}</button><button class="bc-retry" onclick="resetSearch()">${esc(t('btn_not_me'))}</button></div></div>
  </div>`;
}

  document.getElementById('dash-name').innerHTML=esc(c.name_jp)+(state.user.domainMatch?` <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#16a34a;color:#fff;font-size:12px;align-items:center;justify-content:center">✓</span>`:'');
  document.getElementById('dash-bc-name')&&(document.getElementById('dash-bc-name').textContent=c.name_jp);
  const b=document.getElementById('dash-badge');
  if(state.user.domainMatch){b.className='dash-verified-badge verified';b.textContent=t('verified_owner');}
  else{b.className='dash-verified-badge pending';b.textContent=t('pending_verif');}
  renderUploaded();
  showPage('dashboard');
}

// ==================== WEB APIS ====================

// ---- AI DISCOVERY: Find ALL breweries via backend proxy ----
async function aiDiscoverAll(name,signal){
  try{
    const proxyUrl=state.proxyUrl;
    if(!proxyUrl)return [];
    const r=await fetch(proxyUrl,{method:'POST',signal,headers:{
      'Content-Type':'application/json'
    },body:JSON.stringify({query:name})});
    if(!r.ok)return [];
    const d=await r.json();
    return d.results||[];
  }catch(e){if(e.name==='AbortError')throw e;return [];}
}

// ---- WEBSITE VERIFICATION: Check each domain via favicon load ----
async function verifyWebsites(candidates,signal){
  const checks=candidates.map(async(c)=>{
    if(!c.website){c._siteVerified=false;return c;}
    const domain=c.website.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0];
    if(!domain||domain.length<4){c._siteVerified=false;c.website='';return c;}
    try{
      // Try loading favicon as lightweight domain check
      const verified=await new Promise((resolve)=>{
        const img=new Image();
        const timer=setTimeout(()=>{img.src='';resolve(false);},4000);
        img.onload=()=>{clearTimeout(timer);resolve(true);};
        img.onerror=()=>{clearTimeout(timer);resolve(false);};
        img.src=`https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
      });
      // Google favicon service returns a default globe icon for unknown domains
      // but it always returns 200. We do a secondary check: try fetching via HEAD
      // Actually, Google returns a valid image even for dead domains (the globe).
      // So instead, just mark as verified if we got a domain, and let the user see it.
      c._siteVerified=verified;
      return c;
    }catch(e){
      c._siteVerified=false;return c;
    }
  });
  return Promise.all(checks);
}

// ---- GEOCODE ENRICHMENT: Get coordinates for each candidate ----
async function enrichWithGeo(candidates,signal){
  // Geocode each candidate in parallel (but respect Nominatim rate limits)
  for(let i=0;i<candidates.length;i++){
    if(signal.aborted)return candidates;
    const c=candidates[i];
    const q=[c.name_jp,c.prefecture,c.country].filter(Boolean).join(' ');
    if(!q)continue;
    try{
      // Small delay between requests for Nominatim rate limit
      if(i>0)await new Promise(r=>setTimeout(r,300));
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=1&accept-language=${state.lang==='ja'?'ja':'en'}`,{headers:{'User-Agent':'SakePlatform/2.0'},signal});
      if(!r.ok)continue;
      const res=await r.json();
      if(res.length){
        c._geo={lat:+res[0].lat,lng:+res[0].lon};
        // Also fill in address if empty
        if(!c.address&&res[0].display_name)c.address=res[0].display_name;
        if(!c.prefecture){const a=res[0].address||{};c.prefecture=a.province||a.state||'';}
        if(!c.country){const a=res[0].address||{};c.country=a.country||'';}
      }
    }catch(e){if(e.name==='AbortError')throw e;}
  }
  return candidates;
}

// ---- FALLBACK: Nominatim multi-search (no API key path) ----
async function geocodeLookupMulti(name,signal){
  const results=[];
  const seen=new Set();
  try{
    const queries=[name+' sake brewery',name+' 酒造',name+' sakagura',name];
    for(const q of queries){
      if(results.length>=6)break;
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5&accept-language=${state.lang==='ja'?'ja':'en'}`,{headers:{'User-Agent':'SakePlatform/2.0'},signal});
      if(!r.ok)continue;
      const res=await r.json();
      for(const item of res){
        const key=Math.round(+item.lat*100)+','+Math.round(+item.lon*100);
        if(seen.has(key))continue;
        seen.add(key);
        const a=item.address||{};
        results.push({displayName:item.name||'',address:item.display_name||'',lat:+item.lat,lng:+item.lon,prefecture:a.province||a.state||'',country:a.country||'',countryCode:a.country_code||''});
      }
    }
  }catch(e){if(e.name==='AbortError')throw e;}
  return results;
}

// ---- FALLBACK: Wikipedia lookup ----
async function wikiLookup(name,signal){
  try{
    const jaTerms=[name+'酒造',name+' 酒造',name];
    for(const term of jaTerms){
      const sr=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*&srlimit=3`,{signal});
      if(!sr.ok)continue;const sd=await sr.json();const results=sd.query?.search||[];
      const article=results.find(r=>r.snippet.includes('酒')||r.snippet.includes('醸造')||r.snippet.includes('蔵'))||results[0];
      if(!article)continue;
      const er=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(article.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`,{signal});
      if(!er.ok)continue;const ed=await er.json();const pages=ed.query?.pages||{};const page=Object.values(pages)[0];
      if(!page||page.missing!==undefined)continue;
      let extract=(page.extract||'').substring(0,400);
      if(extract.length===400)extract=extract.substring(0,extract.lastIndexOf('。')+1)||extract+'…';
      const fm=extract.match(/(\d{4})年.*?(創業|設立|開業)/)||extract.match(/(創業|設立|開業).*?(\d{4})年/);
      return{extract,founded:fm?(fm[1].match(/\d{4}/)?.[0]||fm[2]):'',name_jp:article.title};
    }
    const enTerms=[name+' sake brewery',name+' sake',name];
    for(const term of enTerms){
      const enr=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*&srlimit=3`,{signal});
      if(!enr.ok)continue;const end=await enr.json();const enR=end.query?.search||[];
      const enA=enR.find(r=>r.snippet.toLowerCase().includes('sake')||r.snippet.toLowerCase().includes('brew'))||enR[0];
      if(!enA)continue;
      const er2=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(enA.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`,{signal});
      if(!er2.ok)continue;const ed2=await er2.json();const p2=Object.values(ed2.query?.pages||{})[0];
      if(!p2||p2.missing===undefined)continue;
      let ext=(p2.extract||'').substring(0,400);
      if(ext.length===400)ext=ext.substring(0,ext.lastIndexOf('.')+1)||ext+'…';
      return{extract:ext,name_en:enA.title};
    }
  }catch(e){if(e.name==='AbortError')throw e;}
  return null;
}

// ==================== DASHBOARD ====================
function handleFiles(files){
  for(const f of files){state.files.push({name:f.name,size:(f.size/1024).toFixed(0)+'KB',type:f.name.split('.').pop().toUpperCase(),status:'processing'});
    setTimeout(()=>{const e=state.files.find(e=>e.name===f.name&&e.status==='processing');if(e)e.status='done';localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();},2000+Math.random()*2000);}
  localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();
}
function renderUploaded(){
  const el=document.getElementById('uploaded-files');if(!state.files.length){el.innerHTML='';return;}
  const ic={PDF:'📕',XLSX:'📗',XLS:'📗',CSV:'📊',DOCX:'📘',DOC:'📘',JPG:'🖼',JPEG:'🖼',PNG:'🖼'};
  el.innerHTML=state.files.map(f=>`<div class="uploaded-file"><div class="uf-info"><div class="uf-icon">${ic[f.type]||'📄'}</div><div><div class="uf-name">${esc(f.name)}</div><div class="uf-meta">${esc(f.size)} · ${esc(f.type)}</div></div></div><div class="uf-status ${f.status}">${f.status==='done'?esc(t('upload_done')):esc(t('upload_processing'))}</div></div>`).join('');
}
function logout(){
  state.user=null;state.brewery=null;state.files=[];state.foundData=null;state.candidates=[];
  localStorage.removeItem('sp_user');localStorage.removeItem('sp_brewery');localStorage.removeItem('sp_files');
  resetSearch();showPage('search');
}

// ==================== SETTINGS ====================
function openSettings(){
  const overlay=document.getElementById('settings-overlay');
  const inp=document.getElementById('settings-api-input');
  inp.value=state.apiKey||'';
  inp.type='password';
  updateSettingsLang();
  updateApiStatus();
  overlay.classList.add('active');
  setTimeout(()=>inp.focus(),100);
}
function closeSettings(){
  document.getElementById('settings-overlay').classList.remove('active');
}
function toggleApiVis(){
  const inp=document.getElementById('settings-api-input');
  inp.type=inp.type==='password'?'text':'password';
}
function onApiKeyInput(){
  updateApiStatus();
}
function updateApiStatus(){
  const inp=document.getElementById('settings-api-input');
  const st=document.getElementById('settings-api-status');
  if(inp.value.trim()){
    st.className='settings-status ok';
    st.textContent=t('settings_status_custom');
  } else if(state.proxyUrl){
    st.className='settings-status ok';
    st.textContent=t('settings_status_ok');
  } else {
    st.className='settings-status empty';
    st.textContent=t('settings_status_empty');
  }
}
function saveApiKey(){
  const val=document.getElementById('settings-api-input').value.trim();
  state.apiKey=val;
  if(val){
    localStorage.setItem('sp_api_key',val);
  } else {
    localStorage.removeItem('sp_api_key');
  }
  closeSettings();
  // Brief toast notification
  showToast(t('settings_saved'));
}
function showToast(msg){
  let toast=document.getElementById('sp-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='sp-toast';
    toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font:500 13px var(--font);opacity:0;transition:all 0.3s ease;z-index:300;pointer-events:none;';
    document.body.appendChild(toast);
  }
  toast.textContent=msg;
  requestAnimationFrame(()=>{
    toast.style.opacity='1';
    toast.style.transform='translateX(-50%) translateY(0)';
    setTimeout(()=>{
      toast.style.opacity='0';
      toast.style.transform='translateX(-50%) translateY(20px)';
    },2500);
  });
}
function updateSettingsLang(){
  const el=id=>document.getElementById(id);
  el('settings-title').textContent=t('settings_title');
  el('settings-api-label').textContent=t('settings_api_label');
  el('settings-api-desc').textContent=t('settings_api_desc');
  el('settings-api-input').placeholder=t('settings_api_placeholder');
  el('settings-get-key').textContent=t('settings_get_key');
  el('settings-btn-cancel').textContent=t('settings_btn_cancel');
  el('settings-btn-save').textContent=t('settings_btn_save');
  updateApiStatus();
}

applyLang();
renderHistory();
if(state.user&&state.brewery)enterDashboard();
else showPage('search');
</script>
