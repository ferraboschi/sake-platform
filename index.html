<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ebe5d8;
  --bg3: #e0d9cc;
  --bg4: #d5cec0;
  --surface: #ffffff;
  --surface2: #faf7f2;
  --border: #d5cec0;
  --border2: #c0b8a8;
  --text: #1a2a44;
  --text2: #4a5568;
  --text3: #8a8070;
  --accent: #3a6ea5;
  --accent2: #2d5a8a;
  --accent-glow: rgba(58,110,165,0.12);
  --gold: #c8a45e;
  --gold2: #a8884e;
  --green: #4a9a6a;
  --green2: rgba(74,154,106,0.12);
  --blue: #5b9bd5;
  --navy: #1a2a44;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --font: 'Inter', 'Noto Sans JP', sans-serif;
  --font-serif: 'Noto Serif JP', serif;
  --shadow: 0 4px 24px rgba(26,42,68,0.08);
  --shadow-lg: 0 8px 48px rgba(26,42,68,0.12);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── TOP BAR ─── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(26,42,68,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  transition: var(--transition);
}
.topbar.hidden { transform: translateY(-100%); }
.topbar-logo {
  font-family: var(--font-serif);
  font-size: 18px; font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 10px;
}
.topbar-logo span { color: var(--gold); font-size: 14px; }
.topbar-nav { display: flex; gap: 4px; }
.topbar-nav button {
  background: none; border: none; color: rgba(255,255,255,0.6);
  font: 500 13px var(--font);
  padding: 8px 16px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
  position: relative;
}
.topbar-nav button:hover { color: #fff; background: rgba(255,255,255,0.1); }
.topbar-nav button.active { color: #fff; }
.topbar-nav button.active::after {
  content: ''; position: absolute; bottom: -1px; left: 16px; right: 16px;
  height: 2px; background: var(--gold); border-radius: 2px;
}
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Language switcher */
.lang-switcher {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 2px;
  border: 1px solid rgba(255,255,255,0.15);
}
.lang-btn {
  background: none; border: none;
  color: rgba(255,255,255,0.5);
  font: 500 11px var(--font);
  padding: 4px 10px; border-radius: 6px;
  cursor: pointer; transition: var(--transition);
  letter-spacing: 0.5px;
}
.lang-btn:hover { color: rgba(255,255,255,0.8); }
.lang-btn.active {
  background: var(--gold);
  color: var(--navy);
}

.topbar-right .settings-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.6); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); font-size: 16px;
}
.topbar-right .settings-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

/* ─── SCREENS ─── */
.screen {
  display: none; min-height: 100vh;
  padding-top: 56px;
  animation: fadeIn 0.4s ease;
}
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ─── HERO / SEARCH SCREEN ─── */
.hero {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - 56px);
  padding: 40px 24px;
  text-align: center;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-kanji {
  font-family: var(--font-serif);
  font-size: 64px; font-weight: 700;
  color: var(--navy);
  letter-spacing: 8px;
  margin-bottom: 12px;
  opacity: 0.9;
}
.hero-sub {
  font-size: 15px; color: var(--text3);
  font-weight: 400; margin-bottom: 48px;
  letter-spacing: 2px;
}
.search-box {
  position: relative; width: 100%; max-width: 520px; z-index: 1;
}
.search-box input {
  width: 100%; height: 60px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0 60px 0 24px;
  font: 400 17px var(--font);
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
.search-box input::placeholder { color: var(--text3); }
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-box .search-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--accent); border: none;
  color: #fff; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.search-box .search-btn:hover { background: var(--accent2); }
.search-box .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.search-hint {
  margin-top: 20px; font-size: 13px; color: var(--text3);
  z-index: 1;
}
.search-hint strong { color: var(--text2); font-weight: 500; }

/* Recent searches */
.recent-searches {
  margin-top: 32px; z-index: 1;
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; max-width: 520px;
}
.recent-tag {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 16px;
  font: 400 13px var(--font); color: var(--text2);
  cursor: pointer; transition: var(--transition);
}
.recent-tag:hover { border-color: var(--accent); color: var(--accent); }

/* ─── DISCOVERY SCREEN ─── */
.discovery {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - 56px);
  padding: 40px 24px;
}
.discovery-container {
  width: 100%; max-width: 480px;
  position: relative;
}
.discovery-brewery-name {
  font-family: var(--font-serif);
  font-size: 28px; font-weight: 600;
  text-align: center; margin-bottom: 8px;
}
.discovery-subtitle {
  text-align: center; font-size: 14px;
  color: var(--text3); margin-bottom: 48px;
}

/* Timer */
.discovery-timer {
  text-align: center; margin-bottom: 32px;
  font-size: 36px; font-weight: 300;
  color: var(--text2);
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
}

/* Progress steps */
.progress-steps { display: flex; flex-direction: column; gap: 0; }
.progress-step {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 16px 0;
  position: relative;
}
.progress-step::before {
  content: '';
  position: absolute; left: 15px; top: 48px; bottom: -16px;
  width: 1px; background: var(--border);
}
.progress-step:last-child::before { display: none; }

.step-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text3); font-size: 14px;
  transition: all 0.5s ease;
  position: relative; z-index: 1;
}
.progress-step.active .step-icon {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
}
.progress-step.done .step-icon {
  background: var(--green2);
  border-color: var(--green);
  color: var(--green);
}
.progress-step.active .step-icon::after {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  animation: pulse-ring 1.5s ease infinite;
}
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.5); opacity: 0; }
}

.step-content { flex: 1; padding-top: 4px; }
.step-label {
  font-size: 15px; font-weight: 500; color: var(--text);
  transition: var(--transition);
}
.progress-step:not(.active):not(.done) .step-label { color: var(--text3); }
.step-detail {
  font-size: 13px; color: var(--text3);
  margin-top: 4px;
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.4s ease;
  opacity: 0;
}
.progress-step.active .step-detail,
.progress-step.done .step-detail {
  max-height: 60px; opacity: 1;
}

/* Cancel btn */
.discovery-cancel {
  display: block; margin: 40px auto 0;
  background: none; border: 1px solid var(--border);
  color: var(--text3); font: 400 13px var(--font);
  padding: 8px 24px; border-radius: 20px;
  cursor: pointer; transition: var(--transition);
}
.discovery-cancel:hover { border-color: var(--text3); color: var(--text2); }

/* ─── RESULTS SCREEN ─── */
.results {
  padding: 80px 24px 60px;
  max-width: 1100px;
  margin: 0 auto;
}
.results-header {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 40px; gap: 24px;
  flex-wrap: wrap;
}
.results-header-left { flex: 1; min-width: 280px; }
.results-brewery {
  font-family: var(--font-serif);
  font-size: 32px; font-weight: 600;
  margin-bottom: 4px;
}
.results-brewery-en {
  font-size: 14px; color: var(--text3);
  font-weight: 400; margin-bottom: 16px;
}
.results-meta {
  display: flex; flex-wrap: wrap; gap: 16px;
}
.results-meta-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text2);
}
.results-meta-item .icon { color: var(--accent); font-size: 15px; }
.results-header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font: 500 13px var(--font);
  padding: 10px 20px; border-radius: var(--radius-sm);
  cursor: pointer; transition: var(--transition);
  display: flex; align-items: center; gap: 8px;
  border: none;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: var(--accent2); }
.btn-secondary {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2);
}
.btn-secondary:hover { color: var(--text); border-color: var(--border2); }
.btn-ghost {
  background: none; border: none; color: var(--text2);
  padding: 10px 12px;
}
.btn-ghost:hover { color: var(--text); }

/* Company card */
.company-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 32px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 40px;
}
.company-card h3 {
  grid-column: 1 / -1;
  font-size: 14px; font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.company-card h3 .badge {
  font-size: 11px; font-weight: 500;
  background: var(--green2); color: var(--green);
  padding: 2px 8px; border-radius: 10px;
  text-transform: none; letter-spacing: 0;
}
.detail-row { display: flex; flex-direction: column; gap: 4px; }
.detail-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.detail-value { font-size: 14px; color: var(--text); }
.detail-value.highlight { color: var(--accent); font-weight: 500; }
.detail-value.serif { font-family: var(--font-serif); font-size: 16px; }

/* Products section */
.products-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 20px; gap: 16px;
  flex-wrap: wrap;
}
.products-title {
  font-size: 18px; font-weight: 600;
}
.products-count {
  font-size: 13px; color: var(--text3);
  background: var(--bg3); padding: 4px 12px;
  border-radius: 12px;
}
.products-filters {
  display: flex; gap: 6px;
}
.filter-pill {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); font: 400 12px var(--font);
  padding: 5px 14px; border-radius: 16px;
  cursor: pointer; transition: var(--transition);
}
.filter-pill:hover { border-color: var(--border2); color: var(--text); }
.filter-pill.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* Product cards grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.product-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.product-card.selected {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--surface), var(--accent-glow));
}
.product-card .select-check {
  position: absolute; top: 12px; right: 12px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent;
  transition: var(--transition);
}
.product-card.selected .select-check {
  background: var(--accent); border-color: var(--accent);
  color: #fff;
}
.product-type-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 10px;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.badge-daiginjo { background: rgba(200,164,94,0.15); color: var(--gold); }
.badge-ginjo { background: rgba(91,155,213,0.15); color: var(--blue); }
.badge-junmai { background: rgba(92,184,92,0.15); color: var(--green); }
.badge-tokubetsu { background: rgba(168,136,78,0.15); color: var(--gold2); }
.badge-other { background: var(--bg3); color: var(--text2); }

.product-name {
  font-family: var(--font-serif);
  font-size: 17px; font-weight: 500;
  margin-bottom: 4px;
  padding-right: 30px;
}
.product-name-en {
  font-size: 12px; color: var(--text3);
  margin-bottom: 14px;
}
.product-specs {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.spec { display: flex; flex-direction: column; gap: 2px; }
.spec-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.spec-value { font-size: 14px; font-weight: 500; color: var(--text); }
.spec-value.na { color: var(--text3); font-weight: 400; font-style: italic; font-size: 12px; }

.product-rice {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.product-rice .rice-icon { color: var(--gold); }
.product-notes {
  margin-top: 8px;
  font-size: 12px; color: var(--text3);
  font-style: italic; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* Select all bar */
.select-bar {
  position: sticky; bottom: 20px; z-index: 50;
  max-width: 600px; margin: 24px auto 0;
  background: var(--navy);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 14px 20px;
  display: flex; align-items: center;
  justify-content: space-between;
  gap: 16px;
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px);
  transition: var(--transition);
  opacity: 0; transform: translateY(20px);
  pointer-events: none;
}
.select-bar.visible {
  opacity: 1; transform: none; pointer-events: all;
}
.select-bar-left {
  font-size: 14px; color: rgba(255,255,255,0.7);
}
.select-bar-left strong { color: #fff; }
.select-bar-right { display: flex; gap: 8px; }

/* ─── SETTINGS MODAL ─── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 480px;
  padding: 28px;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: none; } }
.modal h2 {
  font-size: 18px; font-weight: 600;
  margin-bottom: 4px;
}
.modal p { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.modal label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text2); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 1px;
}
.modal input[type="text"], .modal input[type="password"] {
  width: 100%; height: 44px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px; font: 400 14px var(--font);
  color: var(--text); outline: none;
  margin-bottom: 16px; transition: var(--transition);
}
.modal input:focus { border-color: var(--accent); }
.modal-actions {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 8px;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .hero-kanji { font-size: 42px; }
  .company-card { grid-template-columns: 1fr; }
  .products-grid { grid-template-columns: 1fr; }
  .results-header { flex-direction: column; }
  .product-specs { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .topbar { padding: 0 12px; }
  .topbar-nav button { padding: 8px 10px; font-size: 12px; }
  .hero { padding: 40px 16px; }
  .search-box input { height: 54px; font-size: 15px; padding: 0 54px 0 18px; }
  .results { padding: 72px 16px 40px; }
  .results-brewery { font-size: 24px; }
  .lang-btn { padding: 4px 7px; font-size: 10px; }
}

/* ─── UTILITY ─── */
.editable {
  cursor: text; border-radius: 4px;
  padding: 1px 4px; margin: -1px -4px;
  transition: var(--transition);
}
.editable:hover { background: var(--bg3); }
.editable:focus {
  outline: none; background: var(--bg);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.fade-in { animation: fadeIn 0.5s ease; }
.slide-up { animation: slideUp 0.5s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

/* ─── DEMO NOT FOUND MODAL ─── */
.demo-modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn 0.3s ease;
}
.demo-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 520px;
  padding: 32px;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s ease;
  text-align: center;
}
.demo-modal-icon { font-size: 48px; margin-bottom: 12px; }
.demo-modal h3 {
  font-size: 20px; font-weight: 600;
  color: var(--navy); margin-bottom: 8px;
}
.demo-modal p { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 16px; }
.demo-modal-section { margin: 20px 0; text-align: left; }
.demo-modal-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 10px;
}
.demo-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.demo-tag {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font: 400 13px var(--font); color: var(--text2);
  cursor: pointer; transition: var(--transition);
}
.demo-tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.demo-modal-divider {
  height: 1px; background: var(--border);
  margin: 20px 0;

/* ─── DASHBOARD ─── */

.btn-sm { padding: 8px 16px; font-size: 12px; }

/* Dashboard tabs */

.dash-tab {

/* Dashboard panels */

.dash-panel.active { display: block; }
.panel-toolbar {

.panel-toolbar-right { display: flex; align-items: center; gap: 8px; }
.panel-title { font-size: 16px; font-weight: 600; }

/* Dashboard product cards */

  gap: 16px;
}
.dash-product-card {
  background: var(--surface); border: 1px solid var(--border);

}
.dash-product-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.dash-product-actions {

}
.dash-product-actions button {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text3); cursor: pointer; font-size: 14px;

.dpc-name-en { font-size: 11px; color: var(--text3); margin: 2px 0 12px; }
.dpc-badge {
  display: inline-block; padding: 2px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 500;
  margin-bottom: 12px;
}
.dpc-specs { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.dpc-spec-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.dpc-spec-value { font-size: 13px; font-weight: 500; }

/* Sheets grid */
.sheets-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.sheet-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  text-align: center; transition: var(--transition);
}
.sheet-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.sheet-card-name { font-family: var(--font-serif); font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.sheet-card-type { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
.sheet-card-actions { display: flex; gap: 8px; justify-content: center; }

/* Commercial view */
.commercial-preview {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px;
}
.commercial-hero { text-align: center; margin-bottom: 32px; }
.commercial-hero h2 { font-family: var(--font-serif); font-size: 28px; margin-bottom: 4px; }
.commercial-hero p { font-size: 13px; color: var(--text3); }
.commercial-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
.commercial-product { text-align: center; padding: 20px; }
.commercial-product-name { font-family: var(--font-serif); font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.commercial-product-type { font-size: 11px; color: var(--gold); margin-bottom: 8px; }
.commercial-product-desc { font-size: 12px; color: var(--text3); font-style: italic; line-height: 1.5; }

/* Exporters */
.exporters-list { display: flex; flex-direction: column; gap: 12px; }
.exporter-card {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px 20px;
}
.exporter-info { display: flex; flex-direction: column; gap: 2px; }
.exporter-name { font-weight: 500; font-size: 14px; }
.exporter-detail { font-size: 12px; color: var(--text3); }

/* Modal large */
.modal-lg { max-width: 640px; max-height: 85vh; overflow-y: auto; }
.sake-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sake-form-grid .form-group { display: flex; flex-direction: column; }
.sake-form-grid .form-group.full { grid-column: 1 / -1; }
.sake-form-grid label { font-size: 11px; font-weight: 500; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.sake-form-grid input, .sake-form-grid select, .sake-form-grid textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font: 400 13px var(--font);
  background: var(--surface2); color: var(--text); outline: none;
}
.sake-form-grid textarea { resize: vertical; }
.sake-form-grid input:focus, .sake-form-grid select:focus, .sake-form-grid textarea:focus { border-color: var(--accent); }

#sheet-lang-select {
  padding: 6px 12px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font: 400 12px var(--font);
  background: var(--surface); cursor: pointer;
}
</style>

// ─────────────────────────────────────────
let state = {
  lang: localStorage.getItem('sp_lang') || 'it',
  apiKey: localStorage.getItem('sp_api_key') || '',
  gmapsKey: localStorage.getItem('sp_gmaps_key') || '',
  email: localStorage.getItem('sp_email') || '',
  breweries: JSON.parse(localStorage.getItem('sp_breweries') || '[]'),
  currentBrewery: null,
  discoveryAborted: false,
  timerInterval: null,
  recentSearches: JSON.parse(localStorage.getItem('sp_recent') || '[]'),
};

function t(key) { return (I18N[state.lang] || I18N.it)[key] || key; }

// ─────────────────────────────────────────
//  LANGUAGE SWITCH
// ─────────────────────────────────────────
function switchLang(lang) {
  state.lang = lang;
  localStorage.setItem('sp_lang', lang);
  applyLang();
}

function applyLang() {
  // Active button
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === state.lang);
  });
  // Nav buttons
  const navMap = ['search', 'products-list', 'sheets'];
  const navLabels = [t('nav_discover'), t('nav_products'), t('nav_sheets')];
  document.querySelectorAll('.topbar-nav button').forEach((b, i) => {
    b.textContent = navLabels[i];
  });
  // Hero
  document.getElementById('hero-kanji').textContent = t('hero_title');
  document.getElementById('hero-sub').textContent = t('hero_sub');
  document.getElementById('brewery-input').placeholder = t('search_placeholder');
  document.getElementById('search-hint').innerHTML = state.apiKey ? t('search_hint_ai') : t('search_hint');
  // Discovery
  document.getElementById('disc-subtitle').textContent = t('disc_subtitle');
  for (let i = 0; i < 5; i++) {
    document.getElementById('step-label-' + i).textContent = t('step_' + i);
  }
  document.getElementById('step-detail-0').textContent = t('step_detail_0');
  document.getElementById('step-detail-4').textContent = t('step_detail_4');
  document.getElementById('disc-cancel').textContent = t('cancel');
  // Settings
  document.getElementById('settings-title').textContent = t('settings_title');

// ─────────────────────────────────────────
//  DISCOVERY ENGINE
// ─────────────────────────────────────────
let discoveryTimer = 0;

function startTimer() {
  discoveryTimer = 0;
  const el = document.getElementById('disc-timer');
  state.timerInterval = setInterval(() => {
    discoveryTimer++;
    const m = String(Math.floor(discoveryTimer / 60)).padStart(2, '0');
    const s = String(discoveryTimer % 60).padStart(2, '0');
    el.textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
}

function setStep(index, status, detail) {
  const steps = document.querySelectorAll('.progress-step');
  steps.forEach((step, i) => {
    step.classList.remove('active', 'done');
    if (i < index) step.classList.add('done');
    if (i === index && status === 'active') step.classList.add('active');
    if (i === index && status === 'done') step.classList.add('done');
  });
  if (detail && document.getElementById('step-detail-' + index)) {
    document.getElementById('step-detail-' + index).textContent = detail;
  }
}

function cancelDiscovery() {
  state.discoveryAborted = true;
  stopTimer();
  showScreen('search');
}

async function startDiscovery() {
  const name = document.getElementById('brewery-input').value.trim();
  if (!name) return;

  state.recentSearches = [name, ...state.recentSearches.filter(n => n !== name)].slice(0, 8);
  localStorage.setItem('sp_recent', JSON.stringify(state.recentSearches));

  state.discoveryAborted = false;
  state.googlePlace = null;
  document.getElementById('disc-name').textContent = name;
  document.querySelectorAll('.progress-step').forEach(s => s.classList.remove('active', 'done'));
  document.getElementById('disc-timer').textContent = '00:00';
  showScreen('discovery');
  startTimer();

  // Always verify via free Nominatim/OSM — no API key needed
  setStep(0, 'active', t('gmaps_searching'));
  const place = await geocodeLookup(name);
  if (state.discoveryAborted) return;
  if (place) {
    state.googlePlace = place;
    setStep(0, 'done', '✓ ' + t('gmaps_verified') + ': ' + (place.displayName || name));
    document.getElementById('disc-name').textContent = place.displayName || name;
  } else {
    setStep(0, 'done', t('gmaps_not_found'));
  }

  if (!state.apiKey) {
    await simulateDiscovery(name);
    return;
  }
  await aiDiscovery(name);
}

// ─────────────────────────────────────────
//  GEOCODE LOOKUP (Free — Nominatim / OSM)
// ─────────────────────────────────────────
async function geocodeLookup(name) {
  try {
    // Search Nominatim for the brewery — add 酒造 to improve Japanese results
    const queries = [
      name + ' 酒造',
      name + ' sake brewery',
      name
    ];
    for (const query of queries) {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=3&accept-language=ja`;
      const resp = await fetch(url, {
        headers: { 'User-Agent': 'SakePlatform/1.0 (sakeplatform.com)' }
      });
      if (!resp.ok) continue;
      const results = await resp.json();
      if (!results || results.length === 0) continue;

      // Find best result — prefer ones in Japan
      const best = results.find(r => r.address?.country_code === 'jp') || results[0];
      const addr = best.address || {};
      const prefecture = addr.province || addr.state || addr.county || '';
      const fullAddress = best.display_name || '';
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${best.lat},${best.lon}`;

      return {
        displayName: best.name || best.display_name?.split(',')[0] || '',
        address: fullAddress,
        lat: parseFloat(best.lat),
        lng: parseFloat(best.lon),
        prefecture: prefecture,
        mapsUrl: mapsUrl,
        osmType: best.type,
        osmClass: best.class,
        importance: best.importance
      };
    }
    return null;
  } catch (err) {
    console.warn('Geocode lookup failed:', err);
    return null;
  }
}

async function simulateDiscovery(name) {
  const delay = ms => new Promise(r => setTimeout(r, ms));
  if (state.discoveryAborted) return;
  const brewery = getDemoBrewery(name);

  // Not found in demo mode — show prompt to add API key
  if (!brewery) {
    stopTimer();
    showScreen('search');
    showDemoNotFound(name);
    return;
  }

  const site = brewery.company.website;
  const prodCount = brewery.products.length;
  // Step 0 already done by geocode in startDiscovery
  setStep(1, 'active', t('sim_reading'));
  await delay(1500);
  if (state.discoveryAborted) return;
  setStep(1, 'done', '3 ' + t('sim_pages'));
  setStep(2, 'active', t('sim_parsing'));
  await delay(2500);
  if (state.discoveryAborted) return;
  setStep(2, 'done', prodCount + ' ' + t('sim_products'));
  setStep(3, 'active', t('sim_searching'));
  await delay(1500);
  if (state.discoveryAborted) return;
  setStep(3, 'done', t('sim_extra'));
  setStep(4, 'active', t('sim_organizing'));
  await delay(1000);
  if (state.discoveryAborted) return;
  setStep(4, 'done', t('sim_ready'));
  stopTimer();
  await delay(500);

  state.currentBrewery = brewery;
  showConfirmScreen(brewery);
}

// ─────────────────────────────────────────
//  AI DISCOVERY
// ─────────────────────────────────────────
async function aiDiscovery(name) {
  const delay = ms => new Promise(r => setTimeout(r, ms));
  // Step 0 already done by geocode in startDiscovery
  setStep(1, 'active', t('ai_asking'));

  try {
    const searchPrompt = `Search for the Japanese sake brewery "${name}". Find:
1. Official website URL
2. Company details: full name (JP + EN), prefecture, address, phone, founding year, philosophy
3. ALL products with: name (JP), type (Junmai Daiginjo/Ginjo/etc), rice variety, polishing rate %, alcohol %, SMV, acidity, volumes, prices
4. Tasting notes for each product

Return ONLY valid JSON:
{
  "company": { "name_jp": "", "name_en": "", "prefecture": "", "address": "", "phone": "", "fax": "", "founded": "", "website": "", "philosophy": "", "speciality": "", "rice_types": [] },
  "products": [{ "name_jp": "", "name_en": "", "type": "", "type_detail": "", "rice": "", "polishing_rate": "", "alcohol": "", "smv": "", "acidity": "", "yeast": "", "volumes": [{"size":"","price":""}], "tasting_notes": "", "awards": "" }]
}`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        messages: [{ role: 'user', content: searchPrompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || 'API error');
    }

    setStep(1, 'done', t('ai_found'));
    setStep(2, 'active', t('ai_analyzing'));
    await delay(500);

    const data = await resp.json();
    const text = data.content[0].text;
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON in response');

    const brewery = JSON.parse(jsonMatch[0]);

    setStep(2, 'done', `${brewery.products?.length || 0} ${t('sim_products')}`);
    setStep(3, 'active', t('ai_integrating'));
    await delay(600);
    setStep(3, 'done', t('ai_integrated'));
    setStep(4, 'active', t('ai_preparing'));
    await delay(400);
    setStep(4, 'done', t('sim_ready'));
    stopTimer();
    await delay(500);

    state.currentBrewery = brewery;
    showConfirmScreen(brewery);

  } catch (err) {
    stopTimer();
    setStep(0, 'done', t('ai_error') + ' ' + err.message);
    alert(t('ai_error_msg') + ' ' + err.message + '\n\n' + t('ai_error_check'));
    showScreen('search');
  }
}

function renderResults(data) {
  const c = data.company;
  const p = data.products || [];
  const gp = state.googlePlace;
  const types = [...new Set(p.map(x => getTypeCategory(x.type)))];
  let selectedIds = new Set(p.map((_, i) => i));

  // If Google Place data available, enrich company data
  if (gp) {
    if (gp.address && !c.address) c.address = gp.address;
    if (gp.phone && !c.phone) c.phone = gp.phone;
    if (gp.website && !c.website) c.website = gp.website;
  }

  // Location verification section
  let gmapsHtml = '';
  if (gp) {
    // OpenStreetMap embed — free, no API key
    const osmEmbed = gp.lat && gp.lng
      ? `https://www.openstreetmap.org/export/embed.html?bbox=${gp.lng-0.005},${gp.lat-0.003},${gp.lng+0.005},${gp.lat+0.003}&layer=mapnik&marker=${gp.lat},${gp.lng}`
      : '';
    gmapsHtml = `
      <div class="gmaps-card slide-up">
        <div class="gmaps-header">
          <div class="gmaps-badge">✓ ${esc(t('gmaps_verified_badge'))}</div>
          ${gp.prefecture ? `<div class="gmaps-rating">${esc(gp.prefecture)}</div>` : ''}
        </div>
        ${gp.address ? `<div class="gmaps-address">${esc(gp.address)}</div>` : ''}
        ${osmEmbed ? `<div class="gmaps-map"><iframe src="${osmEmbed}" width="100%" height="250" style="border:0;border-radius:12px" allowfullscreen loading="lazy"></iframe></div>` : ''}
        <div class="gmaps-links">
          ${gp.mapsUrl ? `<a href="${esc(gp.mapsUrl)}" target="_blank" class="gmaps-link">${esc(t('gmaps_view_map'))} →</a>` : ''}
          ${gp.lat ? `<a href="https://www.openstreetmap.org/?mlat=${gp.lat}&mlon=${gp.lng}#map=16/${gp.lat}/${gp.lng}" target="_blank" class="gmaps-link">OpenStreetMap →</a>` : ''}
        </div>
      </div>
    `;
  }

  const container = document.getElementById('results-container');
  container.innerHTML = `
    <div class="results-header fade-in">
      <div class="results-header-left">
        <div class="results-brewery">${esc(c.name_jp)}${gp ? ' <span class="verified-check" title="' + esc(t('gmaps_verified_badge')) + '">✓</span>' : ''}</div>
        <div class="results-brewery-en">${esc(c.name_en)}</div>

function renderProductCards(products, selectedIds) {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';
  products.forEach((prod, i) => {
    const cat = getTypeCategory(prod.type);
    const badge = getBadgeClass(cat);
    const vols = (prod.volumes || []).map(v => `${v.size} ${v.price}`).join(' · ');
    const card = document.createElement('div');
    card.className = 'product-card' + (selectedIds.has(i) ? ' selected' : '');
    card.dataset.index = i;
    card.dataset.type = cat;
    card.innerHTML = `
      <div class="select-check">${selectedIds.has(i) ? '✓' : ''}</div>
      <div class="product-type-badge ${badge}">${esc(prod.type_detail || prod.type)}</div>
      <div class="product-name">${esc(prod.name_jp)}</div>
      <div class="product-name-en">${esc(prod.name_en || '')}</div>
      <div class="product-specs">
        <div class="spec"><div class="spec-label">${esc(t('spec_polishing'))}</div><div class="spec-value ${!prod.polishing_rate || prod.polishing_rate === '—' ? 'na' : ''}">${esc(prod.polishing_rate || '—')}</div></div>
        <div class="spec"><div class="spec-label">${esc(t('spec_alc'))}</div><div class="spec-value ${!prod.alcohol || prod.alcohol === '—' ? 'na' : ''}">${esc(prod.alcohol || '—')}</div></div>
        <div class="spec"><div class="spec-label">${esc(t('spec_smv'))}</div><div class="spec-value ${!prod.smv || prod.smv === '—' ? 'na' : ''}">${esc(prod.smv || '—')}</div></div>
        <div class="spec"><div class="spec-label">${esc(t('spec_acidity'))}</div><div class="spec-value ${!prod.acidity || prod.acidity === '—' ? 'na' : ''}">${esc(prod.acidity || '—')}</div></div>
        <div class="spec"><div class="spec-label">${esc(t('spec_yeast'))}</div><div class="spec-value ${!prod.yeast || prod.yeast === '—' ? 'na' : ''}">${esc(prod.yeast || '—')}</div></div>
        <div class="spec"><div class="spec-label">${esc(t('spec_volumes'))}</div><div class="spec-value" style="font-size:11px">${esc(vols || '—')}</div></div>
      </div>
      ${prod.rice ? `<div class="product-rice"><span class="rice-icon">⬡</span> ${esc(prod.rice)}</div>` : ''}
      ${prod.tasting_notes ? `<div class="product-notes">${esc(prod.tasting_notes)}</div>` : ''}
      ${prod.awards ? `<div class="product-rice" style="color:var(--gold)"><span>★</span> ${esc(prod.awards)}</div>` : ''}
    `;
    card.onclick = () => {
      if (selectedIds.has(i)) selectedIds.delete(i);
      else selectedIds.add(i);
      card.classList.toggle('selected');
      card.querySelector('.select-check').textContent = selectedIds.has(i) ? '✓' : '';
      updateSelectBar();
    };
    grid.appendChild(card);
  });
}

function filterProducts(type) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  if (type === 'all') {
    document.querySelector('.filter-pill').classList.add('active');
    document.querySelectorAll('.product-card').forEach(c => c.style.display = '');
  } else {
    document.querySelector(`.filter-pill[data-type="${type}"]`).classList.add('active');
    document.querySelectorAll('.product-card').forEach(c => {
      c.style.display = c.dataset.type === type ? '' : 'none';
    });
  }
}

function updateSelectBar() {
  const count = window._selectedIds?.size || 0;
  const el = document.getElementById('selected-count');
  if (el) el.textContent = count;
  const bar = document.getElementById('select-bar');
  if (bar) bar.classList.toggle('visible', count > 0);
  const btn = document.getElementById('import-btn');
  if (btn) btn.textContent = t('import_n').replace('{n}', count);
}

function toggleSelectAll() {
  const all = window._selectedIds.size === window._products.length;
  if (all) {
    window._selectedIds.clear();
  } else {
    window._products.forEach((_, i) => window._selectedIds.add(i));
  }
  document.querySelectorAll('.product-card').forEach(c => {
    const i = parseInt(c.dataset.index);
    const sel = window._selectedIds.has(i);
    c.classList.toggle('selected', sel);
    c.querySelector('.select-check').textContent = sel ? '✓' : '';
  });
  updateSelectBar();
}

function importSelected() {
  const count = window._selectedIds?.size || 0;
  if (count === 0) return;
  const brewery = window._brewery;
  const selectedProducts = [...window._selectedIds].map(i => window._products[i]);
  const saved = {
    company: brewery.company,
    products: selectedProducts,
    importedAt: new Date().toISOString()
  };
  state.breweries.push(saved);
  localStorage.setItem('sp_breweries', JSON.stringify(state.breweries));
  alert(t('import_success').replace('{n}', count));
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getTypeCategory(type) {
  if (!type) return t('other_type');
  const tp = type.toLowerCase();
  if (tp.includes('daiginjo')) return 'Daiginjo';
  if (tp.includes('ginjo')) return 'Ginjo';
  if (tp.includes('tokubetsu')) return 'Tokubetsu';
  if (tp.includes('junmai')) return 'Junmai';
  return t('other_type');
}

function getBadgeClass(cat) {
  const map = { 'Daiginjo': 'badge-daiginjo', 'Ginjo': 'badge-ginjo', 'Junmai': 'badge-junmai', 'Tokubetsu': 'badge-tokubetsu' };
  return map[cat] || 'badge-other';
}

  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value.trim();
  const role = document.getElementById('reg-role').value;

    alert(state.lang === 'ja' ? '全項目を入力してください' : state.lang === 'en' ? 'Please fill all fields' : 'Compila tutti i campi');
    return;
  }

  // Check domain match for verified status
  const c = state.currentBrewery.company;
  const domain = email.split('@')[1] || '';
  const breweryDomain = (c.website || '').replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
  const domainMatch = domain && breweryDomain && domain.toLowerCase() === breweryDomain.toLowerCase();

  // Save user session
  state.user = { name, email, role, domainMatch };
  state.email = email;
  localStorage.setItem('sp_email', email);
  localStorage.setItem('sp_user', JSON.stringify(state.user));
  localStorage.setItem('sp_brewery_data', JSON.stringify(state.currentBrewery));

function clearSakeForm() {
  ['sf-name-jp','sf-name-en','sf-type-detail','sf-rice','sf-polish','sf-alcohol','sf-smv','sf-acidity','sf-yeast','sf-volumes','sf-notes','sf-awards'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
}

function closeSakeModal() {
  document.getElementById('sake-modal').classList.remove('active');
}

function saveSake() {
  const product = {
    name_jp: document.getElementById('sf-name-jp').value.trim(),
    name_en: document.getElementById('sf-name-en').value.trim(),
    type: document.getElementById('sf-type').value,
    type_detail: document.getElementById('sf-type-detail').value.trim(),
    rice: document.getElementById('sf-rice').value.trim(),
    polishing_rate: document.getElementById('sf-polish').value.trim(),
    alcohol: document.getElementById('sf-alcohol').value.trim(),
    smv: document.getElementById('sf-smv').value.trim(),
    acidity: document.getElementById('sf-acidity').value.trim(),
    yeast: document.getElementById('sf-yeast').value.trim(),
    volumes: document.getElementById('sf-volumes').value.split(',').map(v => {
      const parts = v.trim().split(':');
      return { size: parts[0]?.trim() || '', price: parts[1]?.trim() || '' };
    }).filter(v => v.size),
    tasting_notes: document.getElementById('sf-notes').value.trim(),
    awards: document.getElementById('sf-awards').value.trim()
  };
  if (!product.name_jp) return;

  if (editingSakeIndex >= 0) {
    state.currentBrewery.products[editingSakeIndex] = product;
  } else {
    state.currentBrewery.products.push(product);
  }
  localStorage.setItem('sp_brewery_data', JSON.stringify(state.currentBrewery));
  closeSakeModal();
  renderDashProducts();
  renderDashSheets();
  renderCommercialView();
}

function deleteSake(index) {
  const name = state.currentBrewery.products[index]?.name_jp || '';
  if (!confirm(`${t('dash_delete')}: ${name}?`)) return;
  state.currentBrewery.products.splice(index, 1);
  localStorage.setItem('sp_brewery_data', JSON.stringify(state.currentBrewery));
  renderDashProducts();
  renderDashSheets();
  renderCommercialView();
}

function generateSheet(index, type) {
  const p = state.currentBrewery.products[index];
  const c = state.currentBrewery.company;
  const lang = document.getElementById('sheet-lang-select').value;

  // Generate printable HTML sheet
  const w = window.open('', '_blank');
  if (!w) { alert('Please allow popups'); return; }

  const isCommercial = type === 'commercial';
  const title = isCommercial ? (p.name_en || p.name_jp) : p.name_jp;
  const specs = isCommercial ? '' : `
    <table class="specs-table">
      <tr><td>Rice</td><td>${esc(p.rice || '—')}</td><td>Polishing</td><td>${esc(p.polishing_rate || '—')}</td></tr>
      <tr><td>Alcohol</td><td>${esc(p.alcohol || '—')}</td><td>SMV</td><td>${esc(p.smv || '—')}</td></tr>
      <tr><td>Acidity</td><td>${esc(p.acidity || '—')}</td><td>Yeast</td><td>${esc(p.yeast || '—')}</td></tr>
    </table>
    <p class="volumes">${(p.volumes||[]).map(v=>`${v.size} ${v.price}`).join(' · ')}</p>`;

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${esc(title)} — Technical Sheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>

      .header h1 { font-family:'Noto Serif JP',serif; font-size:18px; }
      .header .sub { color:#c8a45e; font-size:11px; }

      .product-en { font-size:13px; color:#666; margin-bottom:${isCommercial?'20px':'16px'}; ${isCommercial?'text-align:center;':''} }
      .type-badge { display:inline-block; background:rgba(58,110,165,0.1); color:#3a6ea5; padding:4px 12px; border-radius:12px; font-size:12px; font-weight:500; margin-bottom:20px; ${isCommercial?'text-align:center;display:block;width:fit-content;margin:0 auto 20px;':''} }
      .specs-table { width:100%; border-collapse:collapse; margin:20px 0; }

      ${isCommercial ? '.commercial-desc { text-align:center; font-size:14px; color:#666; line-height:1.8; margin:20px 40px; } .commercial-highlight { font-family:"Noto Serif JP",serif; font-size:20px; color:#c8a45e; text-align:center; margin:32px 0; }' : ''}
      @media print { body { width:210mm; height:297mm; } }
    </style></head><body>
    <div class="header">
      <div><h1>${esc(c.name_jp)}</h1><div class="sub">${esc(c.name_en || '')}</div></div>

    </div>
    <div class="body">
      <div class="type-badge">${esc(p.type_detail || p.type)}</div>
      <div class="product-title">${esc(p.name_jp)}</div>

      ${isCommercial && p.tasting_notes ? `<div class="commercial-highlight">"</div><div class="commercial-desc">${esc(p.tasting_notes)}</div>` : ''}
      ${specs}
      ${!isCommercial && p.tasting_notes ? `<div class="notes">${esc(p.tasting_notes)}</div>` : ''}

      <div>${esc(c.name_jp)} — ${esc(c.address || '')}</div>

  w.document.close();
  setTimeout(() => w.print(), 500);
}

function printAllSheets() {
  const products = state.currentBrewery.products || [];
  products.forEach((_, i) => generateSheet(i, 'technical'));
}

// ─────────────────────────────────────────
//  COMMERCIAL VIEW
// ─────────────────────────────────────────
function renderCommercialView() {
  const c = state.currentBrewery.company;
  const products = state.currentBrewery.products || [];
  const el = document.getElementById('dash-commercial-preview');
  el.innerHTML = `
    <div class="commercial-hero">
      <h2>${esc(c.name_jp)}</h2>
      <p>${esc(c.name_en || '')} — ${esc(t('commercial_tagline'))}</p>
      ${c.philosophy ? `<p style="margin-top:12px;font-style:italic;color:var(--text3);font-size:13px">${esc(c.philosophy)}</p>` : ''}
    </div>
    <div class="commercial-products">
      ${products.map(p => `
        <div class="commercial-product">
          <div class="commercial-product-type">${esc(p.type_detail || p.type)}</div>
          <div class="commercial-product-name">${esc(p.name_jp)}</div>
          ${p.tasting_notes ? `<div class="commercial-product-desc">${esc(p.tasting_notes)}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

// ─────────────────────────────────────────
//  EXPORTERS
// ─────────────────────────────────────────
function renderExporters() {
  const exporters = state.currentBrewery.exporters || [];
  const el = document.getElementById('dash-exporters-list');
  if (exporters.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">${esc(t('dash_no_exporters'))}</div>`;
    return;
  }
  el.innerHTML = exporters.map((exp, i) => `
    <div class="exporter-card">
      <div class="exporter-info">
        <div class="exporter-name">${esc(exp.name)}</div>
        <div class="exporter-detail">${esc(exp.country || '')} · ${esc(exp.email || '')}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="removeExporter(${i})">✕</button>
    </div>
  `).join('');
}

function openAddExporter() {
  const name = prompt(state.lang === 'it' ? 'Nome esportatore:' : state.lang === 'ja' ? '輸出業者名:' : 'Exporter name:');
  if (!name) return;
  const country = prompt(state.lang === 'it' ? 'Paese:' : state.lang === 'ja' ? '国:' : 'Country:') || '';
  const email = prompt('Email:') || '';
  if (!state.currentBrewery.exporters) state.currentBrewery.exporters = [];
  state.currentBrewery.exporters.push({ name, country, email });
  localStorage.setItem('sp_brewery_data', JSON.stringify(state.currentBrewery));
  renderExporters();
}

function removeExporter(index) {
  state.currentBrewery.exporters.splice(index, 1);
  localStorage.setItem('sp_brewery_data', JSON.stringify(state.currentBrewery));
  renderExporters();
}

// ─────────────────────────────────────────
//  DOMAIN VERIFICATION
// ─────────────────────────────────────────
function openDomainVerify() {
  const c = state.currentBrewery.company;
  const domain = (c.website || '').replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
  document.getElementById('domain-modal-title').textContent = t('domain_title');
  document.getElementById('domain-verify-flow').innerHTML = `
    <p style="margin-bottom:16px;font-size:14px;color:var(--text2)">${esc(t('domain_desc'))}</p>
    <div style="background:var(--surface2);padding:16px;border-radius:8px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px">${esc(t('domain_step1'))}</div>
      <div style="font-size:18px;font-weight:600;color:var(--accent)">${esc(domain || '—')}</div>
    </div>
    <ol style="padding-left:20px;font-size:13px;color:var(--text2);line-height:2">
      <li>${esc(t('domain_step2'))}${esc(domain)}</li>
      <li>${esc(t('domain_step3'))}</li>
    </ol>
    <p style="margin-top:16px;font-size:11px;color:var(--text3)">${esc(t('domain_alt'))}</p>
  `;
  document.getElementById('domain-modal').classList.add('active');
}

function closeDomainModal() {
  document.getElementById('domain-modal').classList.remove('active');
}

// ─────────────────────────────────────────
//  INVITE STAFF
// ─────────────────────────────────────────
function openInviteStaff() {
  document.getElementById('invite-modal-title').textContent = t('invite_title');
  document.getElementById('invite-modal').classList.add('active');
}

function closeInviteModal() {
  document.getElementById('invite-modal').classList.remove('active');
}

function sendInvite() {
  const email = document.getElementById('invite-email').value.trim();
  if (!email) return;
  alert(state.lang === 'it' ? `Invito inviato a ${email}!` : state.lang === 'ja' ? `${email}に招待を送信しました！` : `Invitation sent to ${email}!`);
  closeInviteModal();
}

// ─────────────────────────────────────────
//  LOGOUT
// ─────────────────────────────────────────
function logoutUser() {
  state.user = null;
  state.currentBrewery = null;
  localStorage.removeItem('sp_user');
  localStorage.removeItem('sp_brewery_data');
  document.getElementById('logout-btn').style.display = 'none';
  showScreen('search');
}

// ─────────────────────────────────────────
//  MODIFY RESULT FLOW — go to confirm instead of old results
// ─────────────────────────────────────────
// Override the screen-results display to route to confirm
function showDiscoveryResults(data) {
  state.currentBrewery = data;
  showConfirmScreen(data);
}

// ─────────────────────────────────────────
//  NAVIGATION UPDATE
// ─────────────────────────────────────────
function updateNavForDashboard() {
  // Once logged in, highlight dashboard-related tabs
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
// Check if user has saved session
(function initSession() {
  const savedUser = localStorage.getItem('sp_user');
  const savedBrewery = localStorage.getItem('sp_brewery_data');
  if (savedUser && savedBrewery) {
    try {
      state.user = JSON.parse(savedUser);
      state.currentBrewery = JSON.parse(savedBrewery);
      // Auto-enter dashboard
      applyLang();
      renderRecent();
      enterDashboard();
      return;
    } catch(e) {}
  }
  applyLang();
  renderRecent();
})();
</script>
