<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" onclick="goHome()">
      sake<span class="logo-mark">platform</span>
      <span class="logo-jp">酒蔵</span>
    </div>
    <nav class="topbar-nav" id="topbar-nav">
      <a class="active" id="nav-search" onclick="navTo('search')"></a>
      <a id="nav-register" onclick="navTo('register')" style="display:none"></a>
      <a id="nav-dashboard" onclick="navTo('dashboard')" style="display:none"></a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="it" onclick="switchLang('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>
    </div>
    <div class="topbar-user" id="topbar-user">
      <span class="topbar-user-name" id="topbar-user-name"></span>
      <button class="topbar-user-btn" id="btn-logout" onclick="logout()"></button>
    </div>
  </div>
</div>

<!-- PAGE: SEARCH -->
<div class="screen active" id="page-search">
  <div class="hero" id="hero">
    <div class="hero-kanji" id="hero-kanji"></div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="search-box">
      <input type="text" id="search-input" autocomplete="off" onkeydown="onSearchKeydown(event)">
      <button class="search-go-btn" id="search-go-btn" onclick="startSearch()"></button>
    </div>
    <div class="search-hint" id="search-hint"></div>
    <div id="demo-links" class="demo-links">
      <span style="font-size:12px;color:var(--text3);display:flex;align-items:center" id="demo-label"></span>
    </div>
    <div class="inline-result" id="inline-result" style="display:none"></div>
  </div>
</div>

<!-- PAGE: CLAIM / REGISTER -->
<div class="screen" id="page-register">
  <div class="claim-page">
    <div class="claim-breadcrumb">
      <a onclick="navTo('search')" id="bc-search"></a>
      <span class="sep">→</span>
      <span id="bc-claim"></span>
    </div>

    <div class="claim-brewery" id="claim-brewery"></div>

    <div class="claim-section" id="claim-verification-section">
      <div class="claim-section-title" id="claim-title"></div>
      <div class="claim-section-desc" id="claim-desc"></div>
      <div class="verif-methods" id="verif-methods"></div>
    </div>

    <div class="claim-section" id="claim-form-section">
      <div class="claim-section-title" id="form-title"></div>
      <div class="claim-form" id="claim-form">
        <label id="lbl-name"></label>
        <input type="text" id="inp-name">
        <label id="lbl-email"></label>
        <input type="email" id="inp-email" oninput="checkDomainMatch()">
        <div id="demo-email-hint" style="margin-top:8px;padding:10px 14px;background:var(--accent-glow);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);display:none;cursor:pointer" onclick="fillDemoEmail()"></div>
        <div class="domain-match-alert match" id="domain-match"></div>
        <div class="domain-match-alert no-match" id="domain-no-match"></div>
        <label id="lbl-pass"></label>
        <input type="password" id="inp-pass">
        <button class="btn btn-primary btn-lg btn-full" style="margin-top:28px" onclick="register()" id="btn-register"></button>
      </div>
    </div>

    <div class="email-sent-card" id="email-sent">
      <div class="email-sent-icon">📧</div>
      <div class="email-sent-title" id="email-sent-title"></div>
      <div class="email-sent-desc" id="email-sent-desc"></div>
      <button class="btn btn-primary btn-lg" onclick="enterDashboard()" id="btn-enter-dash"></button>
    </div>
  </div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="screen" id="page-dashboard">
  <div class="dashboard">
    <div class="claim-breadcrumb">
      <a onclick="navTo('search')" id="dash-bc-search"></a>
      <span class="sep">→</span>
      <span id="dash-bc-name"></span>
    </div>
    <div class="dash-header">
      <div>
        <div class="dash-brewery" id="dash-name"></div>
        <div class="dash-verified-badge" id="dash-badge"></div>
      </div>
    </div>
    <div class="upload-section" id="upload-area"
         onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="event.preventDefault();this.classList.remove('dragover');handleFiles(event.dataTransfer.files)">
      <div class="upload-icon">📄</div>
      <div class="upload-title" id="upload-title"></div>
      <div class="upload-desc" id="upload-desc"></div>
      <div class="upload-formats" id="upload-formats"></div>
      <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.doc,.docx,.jpg,.jpeg,.png" style="display:none" onchange="handleFiles(this.files)">
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-modal">
    <div class="settings-header">
      <span class="settings-title" id="settings-title">Impostazioni</span>
      <button class="settings-close" onclick="closeSettings()">&times;</button>
    </div>
    <div class="settings-body">
      <div class="settings-field">
        <label class="settings-label" id="settings-api-label">API Key</label>
        <div class="settings-desc" id="settings-api-desc">
          Inserisci la tua API key di Anthropic per attivare la ricerca AI avanzata.
        </div>
        <div class="settings-input-wrap">
          <input type="password" class="settings-input" id="settings-api-input"
            placeholder="sk-ant-api03-..."
            oninput="onApiKeyInput()">
          <button class="settings-toggle-vis" onclick="toggleApiVis()" title="Show/Hide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="settings-status" id="settings-api-status"></div>
      </div>
      <div class="settings-field" style="display:flex;align-items:center;justify-content:space-between">
        <a class="settings-link" href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" id="settings-get-key">
          Ottieni una API key su console.anthropic.com →
        </a>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn btn-outline" onclick="closeSettings()" id="settings-btn-cancel">Annulla</button>
      <button class="btn btn-primary" onclick="saveApiKey()" id="settings-btn-save">Salva</button>
    </div>
  </div>
</div>

<!-- Load JS modules in order -->
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/search.js"></script>
<script src="js/brewery.js"></script>
<script src="js/dashboard.js"></script>

<!-- Init script -->
<script>
applyLang();
renderHistory();
if(state.user&&state.brewery)enterDashboard();
else showPage('search');
</script>

</body>
</html>
