<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --bg2: #ebe5d8; --bg3: #e0d9cc;
  --surface: #ffffff; --surface2: #faf7f2;
  --border: #d5cec0; --border2: #c0b8a8;
  --text: #1a2a44; --text2: #4a5568; --text3: #8a8070;
  --accent: #3a6ea5; --accent2: #2d5a8a; --accent-glow: rgba(58,110,165,0.12);
  --gold: #c8a45e; --green: #34a853; --green2: rgba(52,168,83,0.1);
  --navy: #1a2a44; --orange: #e67e22; --orange2: rgba(230,126,34,0.1);
  --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
  --font: 'Inter','Noto Sans JP',sans-serif; --font-serif: 'Noto Serif JP',serif;
  --shadow: 0 4px 24px rgba(26,42,68,0.08); --shadow-lg: 0 8px 48px rgba(26,42,68,0.12);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

/* TOPBAR */
.topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:rgba(26,42,68,0.97); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.08); }
.topbar-left { display:flex; align-items:center; gap:24px; }
.topbar-logo { font-family:var(--font-serif); font-size:17px; font-weight:600; color:#fff; letter-spacing:0.5px; display:flex; align-items:center; gap:8px; cursor:pointer; white-space:nowrap; }
.topbar-logo .logo-mark { color:var(--gold); font-size:13px; font-weight:500; letter-spacing:1px; }
.topbar-nav { display:flex; gap:4px; }
.topbar-nav a { color:rgba(255,255,255,0.45); font:500 12px var(--font); padding:6px 12px; border-radius:6px; cursor:pointer; transition:var(--transition); text-decoration:none; letter-spacing:0.3px; }
.topbar-nav a:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.06); }
.topbar-nav a.active { color:#fff; background:rgba(255,255,255,0.1); }
.topbar-right { display:flex; align-items:center; gap:6px; }
.lang-switcher { display:flex; gap:1px; background:rgba(255,255,255,0.08); border-radius:8px; padding:2px; border:1px solid rgba(255,255,255,0.1); }
.lang-btn { background:none; border:none; color:rgba(255,255,255,0.4); font:600 10px var(--font); padding:5px 10px; border-radius:6px; cursor:pointer; transition:var(--transition); letter-spacing:0.5px; }
.lang-btn:hover { color:rgba(255,255,255,0.7); }
.lang-btn.active { background:var(--gold); color:var(--navy); }
.topbar-user { display:none; align-items:center; gap:8px; margin-left:8px; padding-left:12px; border-left:1px solid rgba(255,255,255,0.1); }
.topbar-user-name { color:rgba(255,255,255,0.6); font:500 12px var(--font); }
.topbar-user-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); cursor:pointer; font:500 11px var(--font); padding:5px 12px; border-radius:6px; transition:var(--transition); }
.topbar-user-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }

.screen { display:none; min-height:100vh; padding-top:56px; }
.screen.active { display:block; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border:none; border-radius:var(--radius-sm); font:500 13px var(--font); cursor:pointer; transition:var(--transition); text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-lg { padding:14px 32px; font-size:15px; border-radius:12px; }
.btn-full { width:100%; }
.btn-gold { background:var(--gold); color:#fff; }
.btn-gold:hover { background:#b8944e; }

/* SEARCH PAGE */
.hero { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; min-height:calc(100vh - 56px); padding:100px 24px 60px; transition:padding 0.4s ease; }
.hero.has-results { padding-top:48px; }
.hero-kanji { font-family:var(--font-serif); font-size:52px; font-weight:700; color:var(--navy); letter-spacing:6px; margin-bottom:10px; transition:all 0.4s ease; }
.hero.has-results .hero-kanji { font-size:28px; letter-spacing:3px; margin-bottom:6px; }
.hero-sub { font-size:13px; color:var(--text3); letter-spacing:2px; margin-bottom:44px; transition:all 0.4s ease; }
.hero.has-results .hero-sub { font-size:11px; margin-bottom:20px; }
.search-box { position:relative; width:100%; max-width:520px; }
.search-box input { width:100%; height:58px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:0 58px 0 22px; font:400 16px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.search-go { position:absolute; right:7px; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
.search-go:hover { background:var(--accent2); }
.search-go:disabled { opacity:0.4; cursor:not-allowed; }
.search-hint { margin-top:18px; font-size:12px; color:var(--text3); max-width:520px; text-align:center; line-height:1.6; }
.search-hint strong { color:var(--text2); font-weight:500; }

/* PROGRESS TIMELINE */
.inline-result { width:100%; max-width:580px; margin-top:24px; }
.progress-timeline { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; }
.pt-step { display:flex; align-items:flex-start; gap:12px; padding:8px 0; position:relative; }
.pt-step:not(:last-child) { padding-bottom:14px; }
.pt-step:not(:last-child)::after { content:''; position:absolute; left:11px; top:28px; bottom:0; width:1.5px; background:var(--bg3); }
.pt-step.done:not(:last-child)::after { background:var(--green); }
.pt-step.active:not(:last-child)::after { background:linear-gradient(var(--accent),var(--bg3)); }
.pt-icon { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; transition:var(--transition); border:2px solid var(--bg3); color:var(--text3); background:var(--surface); }
.pt-step.active .pt-icon { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); animation:pulse 1.5s ease infinite; }
.pt-step.done .pt-icon { border-color:var(--green); color:#fff; background:var(--green); font-size:10px; }
.pt-step.waiting .pt-icon { border-color:var(--bg3); color:var(--text3); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(58,110,165,0.2)} 50%{box-shadow:0 0 0 6px rgba(58,110,165,0)} }
.pt-label { font-size:13px; font-weight:500; color:var(--text2); }
.pt-step.active .pt-label { color:var(--accent); }
.pt-step.done .pt-label { color:var(--green); }
.pt-detail { font-size:11px; color:var(--text3); margin-top:2px; }
.pt-step.done .pt-detail { color:var(--green); }

/* BREWERY CARD */
.brewery-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); animation:slideUp 0.5s ease; overflow:hidden; }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.bc-header { display:flex; align-items:center; gap:16px; padding:24px 24px 0; }
.bc-logo { width:56px; height:56px; border-radius:14px; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.bc-logo img { width:100%; height:100%; object-fit:contain; }
.bc-logo-fallback { font-size:28px; }
.bc-title { flex:1; }
.bc-name-jp { font-family:var(--font-serif); font-size:22px; font-weight:600; line-height:1.3; }
.bc-name-en { font-size:12px; color:var(--text3); margin-top:2px; }
.bc-body { padding:20px 24px; }
.bc-website { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; background:var(--accent-glow); border:1px solid rgba(58,110,165,0.15); border-radius:20px; font-size:13px; font-weight:500; color:var(--accent); margin-bottom:16px; text-decoration:none; }
.bc-website:hover { background:rgba(58,110,165,0.18); }
.bc-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.bc-info-item { display:flex; align-items:flex-start; gap:8px; }
.bc-info-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.bc-info-value { font-size:12px; color:var(--text); margin-top:1px; }
.bc-history { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:16px; padding:14px 16px; background:var(--surface2); border-radius:var(--radius-sm); border-left:3px solid var(--gold); }
.bc-products-badge { display:flex; align-items:center; gap:10px; padding:14px 18px; background:linear-gradient(135deg, var(--green2), rgba(52,168,83,0.05)); border:1px solid rgba(52,168,83,0.2); border-radius:var(--radius); margin-bottom:4px; }
.bc-products-number { font-size:28px; font-weight:700; color:var(--green); }
.bc-products-label { font-size:13px; color:var(--green); font-weight:500; line-height:1.3; }
.bc-products-sublabel { font-size:11px; color:var(--text3); font-weight:400; }
.bc-map { border-top:1px solid var(--border); }
.bc-sources { padding:10px 24px; background:var(--surface2); border-top:1px solid var(--border); font-size:10px; color:var(--text3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.bc-source-tag { padding:2px 8px; background:var(--bg); border-radius:10px; }
.bc-cta { padding:20px 24px; border-top:1px solid var(--border); text-align:center; }
.bc-cta-text { font-size:14px; color:var(--text2); margin-bottom:14px; }
.bc-cta-actions { display:flex; gap:10px; justify-content:center; align-items:center; }
.bc-retry { font-size:12px; color:var(--text3); background:none; border:none; cursor:pointer; padding:8px 14px; }
.bc-retry:hover { color:var(--accent); }

/* CLAIM / REGISTER PAGE */
.claim-page { max-width:560px; margin:0 auto; padding:32px 24px 60px; }
.claim-breadcrumb { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text3); margin-bottom:24px; }
.claim-breadcrumb a { color:var(--accent); cursor:pointer; text-decoration:none; }
.claim-breadcrumb a:hover { text-decoration:underline; }
.claim-breadcrumb .sep { color:var(--border2); }

.claim-brewery { display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:24px; }
.claim-brewery-logo { width:36px; height:36px; border-radius:8px; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.claim-brewery-logo img { width:100%; height:100%; object-fit:contain; }
.claim-brewery-name { font-family:var(--font-serif); font-size:16px; font-weight:600; }
.claim-brewery-site { font-size:11px; color:var(--text3); }

.claim-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; }
.claim-section-title { font-size:15px; font-weight:600; margin-bottom:6px; }
.claim-section-desc { font-size:13px; color:var(--text3); line-height:1.6; margin-bottom:20px; }

/* Verification methods */
.verif-methods { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.verif-method { display:flex; align-items:flex-start; gap:12px; padding:14px 16px; background:var(--surface2); border:1px solid var(--bg2); border-radius:var(--radius-sm); transition:var(--transition); }
.verif-method.recommended { border-color:var(--green); background:var(--green2); }
.verif-method-icon { width:32px; height:32px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.verif-method.recommended .verif-method-icon { background:var(--green); color:#fff; font-size:14px; }
.verif-method-title { font-size:13px; font-weight:600; }
.verif-method-desc { font-size:11px; color:var(--text3); margin-top:2px; line-height:1.5; }
.verif-method-badge { display:inline-flex; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; margin-top:4px; }
.verif-method-badge.auto { background:var(--green2); color:var(--green); }
.verif-method-badge.manual { background:var(--orange2); color:var(--orange); }

/* Form inside claim */
.claim-form label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin:14px 0 6px; text-transform:uppercase; letter-spacing:0.5px; }
.claim-form label:first-child { margin-top:0; }
.claim-form input { width:100%; height:44px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 14px; font:400 14px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.claim-form input:focus { border-color:var(--accent); }
.domain-match-alert { margin-top:10px; padding:12px 16px; border-radius:var(--radius-sm); font-size:12px; line-height:1.5; display:none; }
.domain-match-alert.match { background:var(--green2); border:1px solid rgba(52,168,83,0.2); color:var(--green); }
.domain-match-alert.no-match { background:var(--orange2); border:1px solid rgba(230,126,34,0.2); color:var(--orange); }

/* Email sent state */
.email-sent-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; text-align:center; display:none; }
.email-sent-icon { font-size:48px; margin-bottom:12px; }
.email-sent-title { font-size:18px; font-weight:600; margin-bottom:8px; }
.email-sent-desc { font-size:13px; color:var(--text3); line-height:1.6; margin-bottom:20px; }

/* DASHBOARD */
.dashboard { max-width:800px; margin:0 auto; padding:32px 24px 60px; }
.dash-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:32px; }
.dash-brewery { font-family:var(--font-serif); font-size:24px; font-weight:600; display:flex; align-items:center; gap:8px; }
.dash-verified-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:4px; }
.dash-verified-badge.verified { background:var(--green2); color:var(--green); }
.dash-verified-badge.pending { background:#fff3cd; color:#856404; }
.upload-section { background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius-lg); padding:48px 32px; text-align:center; margin-bottom:32px; transition:var(--transition); cursor:pointer; }
.upload-section:hover { border-color:var(--accent); background:var(--surface2); }
.upload-section.dragover { border-color:var(--accent); background:var(--accent-glow); }
.upload-icon { font-size:48px; margin-bottom:12px; }
.upload-title { font-size:16px; font-weight:600; margin-bottom:6px; }
.upload-desc { font-size:13px; color:var(--text3); margin-bottom:16px; line-height:1.6; }
.upload-formats { font-size:11px; color:var(--text3); }
.upload-formats strong { color:var(--text2); }
.uploaded-files { margin-bottom:32px; }
.uploaded-file { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:8px; }
.uf-info { display:flex; align-items:center; gap:12px; }
.uf-icon { font-size:24px; }
.uf-name { font-size:13px; font-weight:500; }
.uf-meta { font-size:11px; color:var(--text3); }
.uf-status { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:500; }
.uf-status.processing { background:#fff3cd; color:#856404; }
.uf-status.done { background:var(--green2); color:var(--green); }

@media(max-width:640px) {
  .topbar-nav { display:none; }
  .hero-kanji { font-size:36px; }
  .hero.has-results .hero-kanji { font-size:22px; }
  .search-box input { height:52px; font-size:15px; }
  .bc-header { padding:20px 18px 0; }
  .bc-body { padding:16px 18px; }
  .bc-info-grid { grid-template-columns:1fr; }
  .bc-cta { padding:16px 18px; }
  .bc-cta-actions { flex-direction:column; }
  .claim-page { padding:20px 16px 40px; }
  .topbar-user-name { display:none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo" onclick="goHome()">酒蔵 <span class="logo-mark">PLATFORM</span></div>
    <nav class="topbar-nav" id="topbar-nav">
      <a class="active" id="nav-search" onclick="navTo('search')"></a>
      <a id="nav-register" onclick="navTo('register')" style="display:none"></a>
      <a id="nav-dashboard" onclick="navTo('dashboard')" style="display:none"></a>
    </nav>
  </div>
  <div class="topbar-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="it" onclick="switchLang('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>
    </div>
    <div class="topbar-user" id="topbar-user">
      <span class="topbar-user-name" id="topbar-user-name"></span>
      <button class="topbar-user-btn" id="btn-logout" onclick="logout()"></button>
    </div>
  </div>
</div>

<!-- PAGE: SEARCH -->
<div class="screen active" id="page-search">
  <div class="hero" id="hero">
    <div class="hero-kanji" id="hero-kanji"></div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="search-box">
      <input type="text" id="search-input" autocomplete="off" oninput="onSearchInput()" onkeydown="if(event.key==='Enter'){clearTimeout(state.debounceTimer);startSearch();}">
      <button class="search-go" id="search-go-btn" onclick="clearTimeout(state.debounceTimer);startSearch()">→</button>
    </div>
    <div class="search-hint" id="search-hint"></div>
    <div id="demo-links" style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
      <span style="font-size:11px;color:var(--text3)" id="demo-label"></span>
      <button onclick="runDemo('kenbishi')" style="background:none;border:1px solid var(--border);border-radius:16px;padding:4px 12px;font:500 11px var(--font);color:var(--accent);cursor:pointer">剣菱 Kenbishi</button>
      <button onclick="runDemo('dassai')" style="background:none;border:1px solid var(--border);border-radius:16px;padding:4px 12px;font:500 11px var(--font);color:var(--accent);cursor:pointer">獺祭 Dassai</button>
      <button onclick="runDemo('tatenokawa')" style="background:none;border:1px solid var(--border);border-radius:16px;padding:4px 12px;font:500 11px var(--font);color:var(--accent);cursor:pointer">楯野川 Tatenokawa</button>
    </div>
    <div class="inline-result" id="inline-result" style="display:none"></div>
  </div>
</div>

<!-- PAGE: CLAIM / REGISTER -->
<div class="screen" id="page-register">
  <div class="claim-page">
    <div class="claim-breadcrumb">
      <a onclick="navTo('search')" id="bc-search"></a>
      <span class="sep">→</span>
      <span id="bc-claim"></span>
    </div>

    <div class="claim-brewery" id="claim-brewery"></div>

    <!-- Verification explanation -->
    <div class="claim-section" id="claim-verification-section">
      <div class="claim-section-title" id="claim-title"></div>
      <div class="claim-section-desc" id="claim-desc"></div>

      <div class="verif-methods" id="verif-methods"></div>
    </div>

    <!-- Registration form -->
    <div class="claim-section" id="claim-form-section">
      <div class="claim-section-title" id="form-title"></div>
      <div class="claim-form" id="claim-form">
        <label id="lbl-name"></label>
        <input type="text" id="inp-name">
        <label id="lbl-email"></label>
        <input type="email" id="inp-email" oninput="checkDomainMatch()">
        <div id="demo-email-hint" style="margin-top:6px;padding:8px 12px;background:var(--accent-glow);border-radius:var(--radius-sm);font-size:11px;color:var(--accent);display:none;cursor:pointer" onclick="fillDemoEmail()"></div>
        <div class="domain-match-alert match" id="domain-match"></div>
        <div class="domain-match-alert no-match" id="domain-no-match"></div>
        <label id="lbl-pass"></label>
        <input type="password" id="inp-pass">
        <button class="btn btn-gold btn-lg btn-full" style="margin-top:24px" onclick="register()" id="btn-register"></button>
      </div>
    </div>

    <!-- Email sent -->
    <div class="email-sent-card" id="email-sent">
      <div class="email-sent-icon">📧</div>
      <div class="email-sent-title" id="email-sent-title"></div>
      <div class="email-sent-desc" id="email-sent-desc"></div>
      <button class="btn btn-primary btn-lg" onclick="enterDashboard()" id="btn-enter-dash"></button>
    </div>
  </div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="screen" id="page-dashboard">
  <div class="dashboard">
    <div class="claim-breadcrumb">

// ==================== SEARCH ====================
const DEBOUNCE_MS=800, MIN_CHARS=3;

function runDemo(name){
  document.getElementById('search-input').value=name;
  document.getElementById('demo-links').style.display='none';
  clearTimeout(state.debounceTimer);
  startSearch();
}

function onSearchInput(){
  clearTimeout(state.debounceTimer);
  const val=document.getElementById('search-input').value.trim();
  if(!val && state.foundData){resetSearch();return;}
  if(val===state.lastQuery)return;
  if(val.length<MIN_CHARS)return;
  state.debounceTimer=setTimeout(()=>startSearch(),DEBOUNCE_MS);
}

async function startSearch(){
  const name=document.getElementById('search-input').value.trim();
  if(!name||name.length<MIN_CHARS)return;
  if(name===state.lastQuery&&state.foundData)return;
  if(state.abortCtrl){state.abortCtrl.abort();}
  state.lastQuery=name;
  state.abortCtrl=new AbortController();
  const signal=state.abortCtrl.signal;

  state.searching=true;state.foundData=null;
  const hero=document.getElementById('hero');
  const ir=document.getElementById('inline-result');
  hero.classList.add('has-results');
  document.getElementById('search-hint').style.display='none';
  document.getElementById('demo-links').style.display='none';
  ir.style.display='block';

  function aborted(){return signal.aborted;}

  // Render progress timeline
  function renderTimeline(steps){
    if(aborted())return;
    ir.innerHTML=`<div class="progress-timeline">${steps.map((s,i)=>`
      <div class="pt-step ${s.state}">
        <div class="pt-icon">${s.state==='done'?'✓':s.state==='active'?'⟳':(i+1)}</div>
        <div>
          <div class="pt-label">${esc(s.label)}</div>
          <div class="pt-detail">${esc(s.detail)}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  const steps=[
    {label:t('ps_geo'),detail:t('ps_geo_detail'),state:'active'},
    {label:t('ps_wiki'),detail:t('ps_wiki_detail'),state:'waiting'},
    {label:t('ps_products'),detail:t('ps_products_detail'),state:'waiting'},
    {label:t('ps_merge'),detail:t('ps_merge_detail'),state:'waiting'},
  ];
  renderTimeline(steps);

  try{
  // Step 1: Geocode
  const geo=await geocodeLookup(name,signal);
  if(aborted())return;
  let domain='',displayName=name,address='',prefecture='',lat=null,lng=null;
  if(geo){displayName=geo.displayName||name;address=geo.address||'';prefecture=geo.prefecture||'';lat=geo.lat;lng=geo.lng;}
  // Try domain guess
  const slug=name.toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!domain && slug.length>2) domain=slug+'.co.jp';
  steps[0]={label:t('ps_geo'),detail:domain?t('ps_found_domain').replace('{domain}',domain):'✓',state:'done'};
  steps[1].state='active';
  renderTimeline(steps);

  // Step 2: Wikipedia
  const wiki=await wikiLookup(name,signal);
  if(aborted())return;
  const srcCount=(wiki?1:0)+(geo?1:0);
  steps[1]={label:t('ps_wiki'),detail:t('ps_found_sources').replace('{n}',srcCount),state:'done'};
  steps[2].state='active';
  renderTimeline(steps);

  // Step 3: AI products
  let aiData=null;
  if(state.apiKey){
    aiData=await aiSearch(name,signal);
    if(aborted())return;
  }
  const pc=aiData?.products?.length||aiData?.product_count||0;
  if(aiData?.company?.website) domain=aiData.company.website;
  else if(wiki?.website) domain=wiki.website;
  steps[2]={label:t('ps_products'),detail:pc?t('ps_found_products').replace('{n}',pc):'✓',state:'done'};
  steps[3].state='active';
  renderTimeline(steps);

  // Step 4: Merge
  await new Promise(r=>setTimeout(r,400));
  if(aborted())return;

  const company={
    name_jp:aiData?.company?.name_jp||wiki?.name_jp||displayName,
    name_en:aiData?.company?.name_en||wiki?.name_en||'',
    website:aiData?.company?.website||wiki?.website||domain,
    prefecture:aiData?.company?.prefecture||prefecture||wiki?.prefecture||'',
    address:aiData?.company?.address||address||'',
    phone:aiData?.company?.phone||'',
    founded:aiData?.company?.founded||wiki?.founded||'',
    history:wiki?.extract||aiData?.company?.history||'',
  };
  const productCount=pc;
  const sources=aiData?.sources||[];

  steps[3]={label:t('ps_merge'),detail:t('ps_done'),state:'done'};
  renderTimeline(steps);
  state.searching=false;

  if(!company.name_jp&&!company.website&&!geo&&!wiki){
    ir.innerHTML=`<div class="progress-timeline"><div style="padding:8px;text-align:center;color:var(--text3)">${esc(t('not_found'))}</div></div>`;
    setTimeout(()=>{ir.style.display='none';hero.classList.remove('has-results');document.getElementById('search-hint').style.display='';document.getElementById('demo-links').style.display='flex';},4000);
    return;
  }

  await new Promise(r=>setTimeout(r,600));
  if(aborted())return;
  state.foundData={company,productCount,sources,_geo:geo?{lat,lng}:null,_products:aiData?.products||[]};
  showBreweryCard(state.foundData);

  }catch(e){if(e.name==='AbortError')return;state.searching=false;}
}

function showBreweryCard(data){
  const c=data.company,pc=data.productCount,geo=data._geo,sources=data.sources||[];
  const ir=document.getElementById('inline-result');
  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
  const fav=website?`https://www.google.com/s2/favicons?domain=${website}&sz=128`:'';
  const logo=fav?`<img src="${fav}" onerror="this.parentElement.innerHTML='<div class=bc-logo-fallback>🏯</div>'">`:`<div class="bc-logo-fallback">🏯</div>`;
  const map=geo&&geo.lat?`<div class="bc-map"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${geo.lng-0.006},${geo.lat-0.004},${geo.lng+0.006},${geo.lat+0.004}&layer=mapnik&marker=${geo.lat},${geo.lng}" width="100%" height="140" style="border:0" loading="lazy"></iframe></div>`:'';
  const hist=c.history?`<div class="bc-history">${esc(c.history)}</div>`:'';
  const info=[];
  if(c.prefecture)info.push({l:t('prefecture_label'),v:c.prefecture});
  if(c.founded)info.push({l:t('founded_label'),v:c.founded});
  if(c.address)info.push({l:t('address_label'),v:c.address});
  if(c.phone)info.push({l:t('phone_label'),v:c.phone});
  const grid=info.length?`<div class="bc-info-grid">${info.map(i=>`<div class="bc-info-item"><div><div class="bc-info-label">${esc(i.l)}</div><div class="bc-info-value">${esc(i.v)}</div></div></div>`).join('')}</div>`:'';
  const prods=pc>0?`<div class="bc-products-badge"><div class="bc-products-number">${pc}</div><div><div class="bc-products-label">${esc(t('products_found'))}</div><div class="bc-products-sublabel">${esc(t('products_sublabel'))}</div></div></div>`:'';
  const srcHtml=(sources.length||website)?`<div class="bc-sources">${website?`<span class="bc-source-tag">${esc(website)}</span>`:''}${sources.map(s=>`<span class="bc-source-tag">${esc(s)}</span>`).join('')}</div>`:'';

  ir.innerHTML=`<div class="brewery-card">
    <div class="bc-header"><div class="bc-logo">${logo}</div><div class="bc-title"><div class="bc-name-jp">${esc(c.name_jp)}</div>${c.name_en?`<div class="bc-name-en">${esc(c.name_en)}</div>`:''}</div></div>
    <div class="bc-body">${website?`<a class="bc-website" href="https://${esc(website)}" target="_blank">🌐 ${esc(website)}</a>`:''}${grid}${hist}${prods}</div>
    ${map}${srcHtml}
    <div class="bc-cta"><div class="bc-cta-text">${esc(t('found_confirm'))}</div><div class="bc-cta-actions"><button class="btn btn-gold btn-lg" onclick="confirmBrewery()">${esc(t('btn_confirm'))}</button><button class="bc-retry" onclick="resetSearch()">${esc(t('btn_not_me'))}</button></div></div>
  </div>`;
}

function resetSearch(){
  if(state.abortCtrl){state.abortCtrl.abort();}
  clearTimeout(state.debounceTimer);
  state.searching=false;state.foundData=null;state.lastQuery='';
  const ir=document.getElementById('inline-result');
  ir.style.display='none';ir.innerHTML='';
  document.getElementById('hero').classList.remove('has-results');
  document.getElementById('search-hint').style.display='';document.getElementById('demo-links').style.display='flex';
  document.getElementById('search-input').value='';
  document.getElementById('search-input').focus();
}

function confirmBrewery(){
  if(!state.foundData)return;
  state.brewery=state.foundData;
  localStorage.setItem('sp_brewery',JSON.stringify(state.foundData));
  setupClaimPage();
  showPage('register');
}

     <div><div class="claim-brewery-name">${esc(c.name_jp)}</div><div class="claim-brewery-site">${esc(website)}</div></div>`;

  document.getElementById('claim-desc').textContent=t('claim_desc');

      <div class="verif-method-desc">${esc(t('verif_email_desc').replace(/\{domain\}/g,dom))}</div>

    </div>
    <div class="verif-method">
      <div class="verif-method-icon">📄</div>
      <div><div class="verif-method-title">${esc(t('verif_doc_title'))}</div>
      <div class="verif-method-desc">${esc(t('verif_doc_desc'))}</div>
      <div class="verif-method-badge manual">${esc(t('verif_doc_badge'))}</div></div>
    </div>
    <div class="verif-method">
      <div class="verif-method-icon">📞</div>
      <div><div class="verif-method-title">${esc(t('verif_phone_title'))}</div>
      <div class="verif-method-desc">${esc(t('verif_phone_desc'))}</div>
      <div class="verif-method-badge manual">${esc(t('verif_phone_badge'))}</div></div>
    </div>
    <div class="verif-method">
      <div class="verif-method-icon">📱</div>
      <div><div class="verif-method-title">${esc(t('verif_social_title'))}</div>
      <div class="verif-method-desc">${esc(t('verif_social_desc'))}</div>
      <div class="verif-method-badge manual">${esc(t('verif_social_badge'))}</div></div>

  const demoHint=document.getElementById('demo-email-hint');

}

function fillDemoEmail(){
  const hint=document.getElementById('demo-email-hint');
  const email=hint.dataset.email||'test@example.co.jp';
  document.getElementById('inp-email').value=email;
  document.getElementById('inp-name').value='Test User';
  document.getElementById('inp-pass').value='demo1234';
  hint.style.display='none';
  checkDomainMatch();
}

function checkDomainMatch(){
  const c=state.brewery?.company;if(!c)return;
  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();
  const emailDomain=(document.getElementById('inp-email').value.split('@')[1]||'').toLowerCase();
  const matchEl=document.getElementById('domain-match');
  const noMatchEl=document.getElementById('domain-no-match');
  if(!emailDomain||!emailDomain.includes('.')){matchEl.style.display='none';noMatchEl.style.display='none';return;}
  if(website&&emailDomain===website){matchEl.style.display='block';noMatchEl.style.display='none';}
  else{matchEl.style.display='none';noMatchEl.style.display='block';}
}

function register(){
  const name=document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value.trim();
  if(!name||!email||!pass)return;
  const c=state.brewery.company;
  const website=(c.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();
  const d=(email.split('@')[1]||'').toLowerCase();
  const dm=d&&website&&d===website;
  state.user={name,email,domainMatch:dm};
  localStorage.setItem('sp_user',JSON.stringify(state.user));
  document.getElementById('claim-form-section').style.display='none';
  document.getElementById('claim-verification-section').style.display='none';
  document.getElementById('email-sent').style.display='';
  document.getElementById('email-sent-title').textContent=t('email_sent_title');
  document.getElementById('email-sent-desc').textContent=t('email_sent_desc').replace('{email}',email);
}

function enterDashboard(){
  if(!state.brewery||!state.user){showPage('search');return;}
  const c=state.brewery.company;
  document.getElementById('dash-name').innerHTML=esc(c.name_jp)+(state.user.domainMatch?` <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#34a853;color:#fff;font-size:12px;align-items:center;justify-content:center">✓</span>`:'');
  document.getElementById('dash-bc-name')&&(document.getElementById('dash-bc-name').textContent=c.name_jp);
  const b=document.getElementById('dash-badge');
  if(state.user.domainMatch){b.className='dash-verified-badge verified';b.textContent=t('verified_owner');}
  else{b.className='dash-verified-badge pending';b.textContent=t('pending_verif');}
  renderUploaded();
  showPage('dashboard');
}

// ==================== WEB APIS ====================
async function geocodeLookup(name,signal){
  try{const qs=[name+' 酒造',name+' sake brewery',name];
    for(const q of qs){const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=3&accept-language=ja`,{headers:{'User-Agent':'SakePlatform/2.0'},signal});
      if(!r.ok)continue;const res=await r.json();if(!res.length)continue;
      const b=res.find(r=>r.address?.country_code==='jp')||res[0];const a=b.address||{};
      return{displayName:b.name||'',address:b.display_name||'',lat:+b.lat,lng:+b.lon,prefecture:a.province||a.state||''};}
  }catch(e){if(e.name==='AbortError')throw e;}return null;
}

async function wikiLookup(name,signal){
  try{const terms=[name+'酒造',name+' 酒造',name];
    for(const term of terms){const sr=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&format=json&origin=*&srlimit=3`,{signal});
      if(!sr.ok)continue;const sd=await sr.json();const results=sd.query?.search||[];
      const article=results.find(r=>r.snippet.includes('酒')||r.snippet.includes('醸造')||r.snippet.includes('蔵'))||results[0];
      if(!article)continue;
      const er=await fetch(`https://ja.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(article.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`,{signal});
      if(!er.ok)continue;const ed=await er.json();const pages=ed.query?.pages||{};const page=Object.values(pages)[0];
      if(!page||page.missing!==undefined)continue;
      let extract=(page.extract||'').substring(0,400);
      if(extract.length===400)extract=extract.substring(0,extract.lastIndexOf('。')+1)||extract+'…';
      const fm=extract.match(/(\d{4})年.*?(創業|設立|開業)/)||extract.match(/(創業|設立|開業).*?(\d{4})年/);
      return{extract,founded:fm?(fm[1].match(/\d{4}/)?.[0]||fm[2]):'',name_jp:article.title};}
    const enr=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name+' sake brewery')}&format=json&origin=*&srlimit=3`,{signal});
    if(enr.ok){const end=await enr.json();const enR=end.query?.search||[];
      const enA=enR.find(r=>r.snippet.toLowerCase().includes('sake')||r.snippet.toLowerCase().includes('brew'))||enR[0];
      if(enA){const er2=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(enA.title)}&prop=extracts&exintro=1&explaintext=1&format=json&origin=*`,{signal});
        if(er2.ok){const ed2=await er2.json();const p2=Object.values(ed2.query?.pages||{})[0];
          if(p2&&p2.missing===undefined){let ext=(p2.extract||'').substring(0,400);if(ext.length===400)ext=ext.substring(0,ext.lastIndexOf('.')+1)||ext+'…';return{extract:ext,name_en:enA.title};}}}}
  }catch(e){if(e.name==='AbortError')throw e;}return null;
}

async function aiSearch(name,signal){
  try{const p=`You are a comprehensive sake database. Search for the Japanese sake brewery "${name}".
Find ALL information from EVERY source: official website, international importers (Sake Company, Tippsy Sake, Sake Inn, World Sake Imports, JFC, Mutual Trading), sake databases (Saketime, Sake-World), retailers worldwide (Wine-Searcher, Vivino, Total Wine), competition results (IWC, Kura Master, Joy of Sake), and export catalogs.
Return ONLY valid JSON:
{"company":{"name_jp":"","name_en":"","prefecture":"","address":"","phone":"","website":"","founded":"","history":"2-3 sentences"},"products":[{"name_jp":"","name_en":"","type":""}],"product_count":0,"sources":["source1.com","source2.com"]}
CRITICAL: Find as MANY products as possible from ALL international sources.`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal,headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content:p}]})});
    if(!r.ok)return null;const d=await r.json();const txt=d.content[0].text;const m=txt.match(/\{[\s\S]*\}/);if(!m)return null;
    const parsed=JSON.parse(m[0]);
    if(parsed.products?.length&&!parsed.product_count)parsed.product_count=parsed.products.length;
    if(parsed.product_count<(parsed.products?.length||0))parsed.product_count=parsed.products.length;
    return parsed;
  }catch(e){if(e.name==='AbortError')throw e;return null;}
}

// ==================== DASHBOARD ====================
function handleFiles(files){
  for(const f of files){state.files.push({name:f.name,size:(f.size/1024).toFixed(0)+'KB',type:f.name.split('.').pop().toUpperCase(),status:'processing'});
    setTimeout(()=>{const e=state.files.find(e=>e.name===f.name&&e.status==='processing');if(e)e.status='done';localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();},2000+Math.random()*2000);}
  localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();
}
function renderUploaded(){
  const el=document.getElementById('uploaded-files');if(!state.files.length){el.innerHTML='';return;}
  const ic={PDF:'📕',XLSX:'📗',XLS:'📗',CSV:'📊',DOCX:'📘',DOC:'📘',JPG:'🖼',JPEG:'🖼',PNG:'🖼'};
  el.innerHTML=state.files.map(f=>`<div class="uploaded-file"><div class="uf-info"><div class="uf-icon">${ic[f.type]||'📄'}</div><div><div class="uf-name">${esc(f.name)}</div><div class="uf-meta">${esc(f.size)} · ${esc(f.type)}</div></div></div><div class="uf-status ${f.status}">${f.status==='done'?esc(t('upload_done')):esc(t('upload_processing'))}</div></div>`).join('');
}
function logout(){
  state.user=null;state.brewery=null;state.files=[];state.foundData=null;
  localStorage.removeItem('sp_user');localStorage.removeItem('sp_brewery');localStorage.removeItem('sp_files');
  resetSearch();showPage('search');
}

applyLang();
if(state.user&&state.brewery)enterDashboard();
else showPage('search');
</script>
