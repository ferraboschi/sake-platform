<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sake Platform — 蔵元のためのプラットフォーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --bg2: #ebe5d8; --bg3: #e0d9cc;
  --surface: #ffffff; --surface2: #faf7f2;
  --border: #d5cec0; --border2: #c0b8a8;
  --text: #1a2a44; --text2: #4a5568; --text3: #8a8070;
  --accent: #3a6ea5; --accent2: #2d5a8a; --accent-glow: rgba(58,110,165,0.12);
  --gold: #c8a45e; --green: #34a853; --green2: rgba(52,168,83,0.1);
  --navy: #1a2a44;
  --radius: 12px; --radius-sm: 8px; --radius-lg: 20px;
  --font: 'Inter','Noto Sans JP',sans-serif; --font-serif: 'Noto Serif JP',serif;
  --shadow: 0 4px 24px rgba(26,42,68,0.08); --shadow-lg: 0 8px 48px rgba(26,42,68,0.12);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

.topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:rgba(26,42,68,0.95); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.1); }
.topbar-logo { font-family:var(--font-serif); font-size:18px; font-weight:600; color:#fff; letter-spacing:0.5px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.topbar-logo span { color:var(--gold); font-size:14px; }
.topbar-right { display:flex; align-items:center; gap:8px; }
.lang-switcher { display:flex; gap:2px; background:rgba(255,255,255,0.1); border-radius:8px; padding:2px; border:1px solid rgba(255,255,255,0.15); }
.lang-btn { background:none; border:none; color:rgba(255,255,255,0.5); font:500 11px var(--font); padding:4px 10px; border-radius:6px; cursor:pointer; transition:var(--transition); }
.lang-btn:hover { color:rgba(255,255,255,0.8); }
.lang-btn.active { background:var(--gold); color:var(--navy); }
.topbar-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.6); cursor:pointer; font:500 12px var(--font); padding:6px 14px; border-radius:8px; transition:var(--transition); display:none; }
.topbar-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }

.screen { display:none; min-height:100vh; padding-top:56px; }
.screen.active { display:block; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 20px; border:none; border-radius:var(--radius-sm); font:500 13px var(--font); cursor:pointer; transition:var(--transition); text-decoration:none; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-secondary { background:var(--bg2); color:var(--text2); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-lg { padding:14px 32px; font-size:15px; border-radius:12px; }
.btn-full { width:100%; }

/* PAGE 1: SEARCH */
.hero { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 56px); padding:40px 24px; text-align:center; }
.hero-kanji { font-family:var(--font-serif); font-size:56px; font-weight:700; color:var(--navy); letter-spacing:8px; margin-bottom:12px; }
.hero-sub { font-size:14px; color:var(--text3); letter-spacing:2px; margin-bottom:48px; }
.search-box { position:relative; width:100%; max-width:520px; }
.search-box input { width:100%; height:60px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:0 60px 0 24px; font:400 17px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.search-go { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:12px; background:var(--accent); border:none; color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.search-go:hover { background:var(--accent2); }
.search-hint { margin-top:20px; font-size:13px; color:var(--text3); }
.search-hint strong { color:var(--text2); font-weight:500; }

/* DISCOVERY */
.discovery { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 56px); padding:40px 24px; }
.disc-container { width:100%; max-width:520px; }
.disc-name { font-family:var(--font-serif); font-size:28px; font-weight:600; text-align:center; margin-bottom:8px; }
.disc-sub { text-align:center; font-size:14px; color:var(--text3); margin-bottom:40px; }
.disc-timer { text-align:center; font-size:36px; font-weight:300; color:var(--text2); margin-bottom:32px; font-variant-numeric:tabular-nums; }
.progress-steps { display:flex; flex-direction:column; }
.progress-step { display:flex; align-items:flex-start; gap:16px; padding:14px 0; position:relative; }
.progress-step::before { content:''; position:absolute; left:15px; top:46px; bottom:-14px; width:1px; background:var(--border); }
.progress-step:last-child::before { display:none; }
.step-icon { width:32px; height:32px; border-radius:50%; background:var(--bg3); color:var(--text3); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; transition:var(--transition); }
.progress-step.active .step-icon { background:var(--accent); color:#fff; animation:pulse 1.5s ease infinite; }
.progress-step.done .step-icon { background:var(--green); color:#fff; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(58,110,165,0.3)} 50%{box-shadow:0 0 0 8px rgba(58,110,165,0)} }
.step-label { font-size:14px; font-weight:500; }
.step-detail { font-size:12px; color:var(--text3); margin-top:2px; }
.disc-cancel { display:block; margin:32px auto 0; background:none; border:none; color:var(--text3); font:400 13px var(--font); cursor:pointer; }

/* RESULTS */
.results-page { padding:80px 24px 60px; max-width:680px; margin:0 auto; }
.results-intro { text-align:center; margin-bottom:32px; }
.results-intro h2 { font-family:var(--font-serif); font-size:24px; margin-bottom:8px; }
.results-intro p { font-size:14px; color:var(--text3); }
.result-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; cursor:pointer; transition:var(--transition); }
.result-card:hover { border-color:var(--accent); box-shadow:var(--shadow); }
.rc-name { font-family:var(--font-serif); font-size:20px; font-weight:600; }
.rc-name-en { font-size:12px; color:var(--text3); margin:2px 0 12px; }
.rc-details { display:flex; flex-wrap:wrap; gap:16px; font-size:13px; color:var(--text2); }
.rc-products { display:inline-flex; align-items:center; gap:6px; margin-top:12px; padding:6px 14px; background:var(--accent-glow); color:var(--accent); border-radius:20px; font-size:12px; font-weight:500; }
.rc-map { margin-top:16px; border-radius:10px; overflow:hidden; }
.results-actions { text-align:center; margin-top:24px; }

/* REGISTER */
.register-page { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 56px); padding:40px 24px; }
.register-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:40px; max-width:480px; width:100%; box-shadow:var(--shadow-lg); }
.reg-header { text-align:center; margin-bottom:28px; }
.reg-header h2 { font-size:22px; font-weight:600; margin-bottom:6px; }
.reg-header p { font-size:13px; color:var(--text3); }
.reg-brewery { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--accent-glow); border:1px solid rgba(58,110,165,0.2); border-radius:var(--radius-sm); margin-bottom:24px; font-size:14px; font-weight:500; color:var(--accent); }
.reg-form label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin:16px 0 6px; text-transform:uppercase; letter-spacing:0.5px; }
.reg-form label:first-child { margin-top:0; }
.reg-form input { width:100%; height:44px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 14px; font:400 14px var(--font); color:var(--text); outline:none; transition:var(--transition); }
.reg-form input:focus { border-color:var(--accent); }
.domain-hint { margin-top:8px; padding:10px 14px; background:var(--green2); border:1px solid rgba(52,168,83,0.2); border-radius:var(--radius-sm); font-size:12px; color:var(--green); display:none; }
.verification-sent { text-align:center; padding:32px; display:none; }
.verification-sent .icon { font-size:48px; margin-bottom:12px; }
.verification-sent h3 { font-size:18px; margin-bottom:8px; }
.verification-sent p { font-size:13px; color:var(--text3); line-height:1.6; }

/* DASHBOARD */
.dashboard { max-width:800px; margin:0 auto; padding:80px 24px 60px; }
.dash-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:32px; }
.dash-brewery { font-family:var(--font-serif); font-size:24px; font-weight:600; display:flex; align-items:center; gap:8px; }
.dash-verified-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-top:4px; }
.dash-verified-badge.verified { background:var(--green2); color:var(--green); }
.dash-verified-badge.pending { background:#fff3cd; color:#856404; }

.upload-section { background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius-lg); padding:48px 32px; text-align:center; margin-bottom:32px; transition:var(--transition); cursor:pointer; }
.upload-section:hover { border-color:var(--accent); background:var(--surface2); }
.upload-section.dragover { border-color:var(--accent); background:var(--accent-glow); }
.upload-icon { font-size:48px; margin-bottom:12px; }
.upload-title { font-size:16px; font-weight:600; margin-bottom:6px; }
.upload-desc { font-size:13px; color:var(--text3); margin-bottom:16px; line-height:1.6; }
.upload-formats { font-size:11px; color:var(--text3); }
.upload-formats strong { color:var(--text2); }

.uploaded-files { margin-bottom:32px; }
.uploaded-file { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:8px; }
.uf-info { display:flex; align-items:center; gap:12px; }
.uf-icon { font-size:24px; }
.uf-name { font-size:13px; font-weight:500; }
.uf-meta { font-size:11px; color:var(--text3); }
.uf-status { padding:4px 10px; border-radius:12px; font-size:11px; font-weight:500; }
.uf-status.processing { background:#fff3cd; color:#856404; }
.uf-status.done { background:var(--green2); color:var(--green); }

.dash-section { margin-bottom:32px; }
.dash-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.dash-section-title { font-size:16px; font-weight:600; }
.product-row { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 18px; margin-bottom:8px; transition:var(--transition); }
.product-row:hover { border-color:var(--accent); }
.pr-name { font-family:var(--font-serif); font-size:14px; font-weight:500; }
.pr-type { font-size:11px; color:var(--text3); margin-top:2px; }

@media(max-width:640px) {
  .hero-kanji { font-size:38px; }
  .search-box input { height:54px; font-size:15px; }
  .register-card { padding:28px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo" onclick="goHome()">酒蔵 <span>PLATFORM</span></div>
  <div class="topbar-right">
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="it" onclick="switchLang('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">JA</button>
    </div>
    <button class="topbar-btn" id="btn-logout" onclick="logout()"></button>
  </div>
</div>

<!-- PAGE 1: SEARCH -->
<div class="screen active" id="page-search">
  <div class="hero">
    <div class="hero-kanji" id="hero-kanji"></div>
    <div class="hero-sub" id="hero-sub"></div>
    <div class="search-box">
      <input type="text" id="search-input" autocomplete="off" onkeydown="if(event.key==='Enter')startSearch()">
      <button class="search-go" onclick="startSearch()">→</button>
    </div>
    <div class="search-hint" id="search-hint"></div>
  </div>
</div>

<!-- PAGE 1b: DISCOVERY -->
<div class="screen" id="page-discovery">
  <div class="discovery">
    <div class="disc-container">
      <div class="disc-name" id="disc-name"></div>
      <div class="disc-sub" id="disc-sub"></div>
      <div class="disc-timer" id="disc-timer">00:00</div>
      <div class="progress-steps">
        <div class="progress-step" id="step-0"><div class="step-icon">1</div><div><div class="step-label" id="sl-0"></div><div class="step-detail" id="sd-0"></div></div></div>
        <div class="progress-step" id="step-1"><div class="step-icon">2</div><div><div class="step-label" id="sl-1"></div><div class="step-detail" id="sd-1"></div></div></div>
        <div class="progress-step" id="step-2"><div class="step-icon">3</div><div><div class="step-label" id="sl-2"></div><div class="step-detail" id="sd-2"></div></div></div>
      </div>
      <button class="disc-cancel" id="disc-cancel" onclick="cancelSearch()"></button>
    </div>
  </div>
</div>

<!-- PAGE 1c: RESULTS -->
<div class="screen" id="page-results">
  <div class="results-page">
    <div class="results-intro"><h2 id="res-title"></h2><p id="res-desc"></p></div>
    <div id="results-list"></div>
    <div class="results-actions"><button class="btn btn-secondary" onclick="showPage('search')" id="res-back-btn"></button></div>
  </div>
</div>

<!-- PAGE 2: REGISTER -->
<div class="screen" id="page-register">
  <div class="register-page">
    <div class="register-card">
      <div class="reg-header"><h2 id="reg-title"></h2><p id="reg-desc"></p></div>
      <div class="reg-brewery" id="reg-brewery"></div>
      <div class="reg-form" id="reg-form">
        <label id="lbl-name"></label>
        <input type="text" id="inp-name">
        <label id="lbl-email"></label>
        <input type="email" id="inp-email">
        <div class="domain-hint" id="domain-hint"></div>
        <label id="lbl-pass"></label>
        <input type="password" id="inp-pass">
        <button class="btn btn-primary btn-lg btn-full" style="margin-top:24px" onclick="register()" id="btn-register"></button>
      </div>
      <div class="verification-sent" id="verification-sent">
        <div class="icon">📧</div>
        <h3 id="verif-title"></h3>
        <p id="verif-desc"></p>
        <button class="btn btn-primary btn-lg" style="margin-top:20px" onclick="enterDashboard()" id="btn-enter-dash"></button>
      </div>
    </div>
  </div>
</div>

<!-- PAGE 3: DASHBOARD -->
<div class="screen" id="page-dashboard">
  <div class="dashboard">
    <div class="dash-header">
      <div>
        <div class="dash-brewery" id="dash-name"></div>
        <div class="dash-verified-badge" id="dash-badge"></div>
      </div>
    </div>
    <div class="upload-section" id="upload-area"
         onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="event.preventDefault();this.classList.remove('dragover');handleFiles(event.dataTransfer.files)">
      <div class="upload-icon">📄</div>
      <div class="upload-title" id="upload-title"></div>
      <div class="upload-desc" id="upload-desc"></div>
      <div class="upload-formats" id="upload-formats"></div>
      <input type="file" id="file-input" multiple accept=".pdf,.xlsx,.xls,.csv,.doc,.docx,.jpg,.jpeg,.png" style="display:none" onchange="handleFiles(this.files)">
    </div>
    <div class="uploaded-files" id="uploaded-files"></div>
    <div class="dash-section" id="products-section" style="display:none">
      <div class="dash-section-header"><div class="dash-section-title" id="products-title"></div></div>
      <div id="products-list"></div>
    </div>
  </div>
</div>

function showPage(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('page-'+n);
  if(el)el.classList.add('active');
  document.getElementById('btn-logout').style.display=(n==='dashboard')?'block':'none';
}
function goHome(){showPage(state.user&&state.brewery?'dashboard':'search');}

// SEARCH & DISCOVERY
let timer=0;
function startTimer(){timer=0;const el=document.getElementById('disc-timer');state.timerInterval=setInterval(()=>{timer++;el.textContent=String(Math.floor(timer/60)).padStart(2,'0')+':'+String(timer%60).padStart(2,'0');},1000);}
function stopTimer(){if(state.timerInterval)clearInterval(state.timerInterval);}
function setStep(i,st,detail){
  document.querySelectorAll('.progress-step').forEach((s,idx)=>{s.classList.remove('active','done');if(idx<i)s.classList.add('done');if(idx===i&&st==='active')s.classList.add('active');if(idx===i&&st==='done')s.classList.add('done');});
  if(detail){const el=document.getElementById('sd-'+i);if(el)el.textContent=detail;}
}
function cancelSearch(){state.aborted=true;stopTimer();showPage('search');}

async function startSearch(){
  const name=document.getElementById('search-input').value.trim();
  if(!name)return;
  state.aborted=false;
  document.getElementById('disc-name').textContent=name;
  document.getElementById('disc-timer').textContent='00:00';
  document.querySelectorAll('.progress-step').forEach(s=>s.classList.remove('active','done'));
  document.querySelectorAll('.step-detail').forEach(s=>s.textContent='');
  showPage('discovery');
  startTimer();
  const delay=ms=>new Promise(r=>setTimeout(r,ms));

  // Step 1: domain
  setStep(0,'active',t('sd_0'));
  const geo=await geocodeLookup(name);
  if(state.aborted)return;
  let displayName=name,domain='';
  if(geo){displayName=geo.displayName||name;domain=geo.website||'';
    setStep(0,'done','✓ '+displayName+(domain?' — '+domain:''));
    document.getElementById('disc-name').textContent=displayName;
  } else { setStep(0,'done','✓ '+name); }
  await delay(600);

  // Step 2: products
  if(state.aborted)return;
  setStep(1,'active',state.lang==='it'?'Cerco fonti con prodotti...':state.lang==='ja'?'商品のある情報源を検索中...':'Searching product sources...');
  let data=null;
  if(state.apiKey){data=await aiSearch(name);} else {data=getDemoBrewery(name);await delay(2000);}
  if(state.aborted)return;
  if(!data)data={company:{name_jp:displayName,name_en:'',website:domain,prefecture:geo?.prefecture||''},products:[]};
  const pc=data.products?.length||0;
  setStep(1,'done','✓ '+pc+' '+t('res_products'));
  await delay(500);

  // Step 3: finalize
  if(state.aborted)return;
  setStep(2,'active',state.lang==='it'?'Preparo risultati...':state.lang==='ja'?'結果を準備中...':'Preparing results...');
  await delay(600);
  setStep(2,'done','✓');
  stopTimer();
  await delay(400);
  if(geo){if(!data.company.address&&geo.address)data.company.address=geo.address;if(!data.company.prefecture&&geo.prefecture)data.company.prefecture=geo.prefecture;data._geo=geo;}
  showResults(data);
}

async function geocodeLookup(name){
  try{const qs=[name+' 酒造',name+' sake brewery',name];
    for(const q of qs){const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=3&accept-language=ja`,{headers:{'User-Agent':'SakePlatform/2.0'}});
      if(!r.ok)continue;const res=await r.json();if(!res.length)continue;
      const b=res.find(r=>r.address?.country_code==='jp')||res[0];const a=b.address||{};
      return{displayName:b.name||'',address:b.display_name||'',lat:+b.lat,lng:+b.lon,prefecture:a.province||a.state||'',mapsUrl:`https://www.google.com/maps/search/?api=1&query=${b.lat},${b.lon}`};
    }
  }catch(e){}return null;
}

async function aiSearch(name){
  try{const p=`Search for Japanese sake brewery "${name}". Return ONLY valid JSON:\n{"company":{"name_jp":"","name_en":"","prefecture":"","address":"","phone":"","website":""},"products":[{"name_jp":"","name_en":"","type":"","type_detail":"","rice":"","polishing_rate":"","alcohol":"","smv":"","acidity":""}]}`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:p}]})});
    if(!r.ok)return null;const d=await r.json();const txt=d.content[0].text;const m=txt.match(/\{[\s\S]*\}/);if(!m)return null;return JSON.parse(m[0]);
  }catch(e){return null;}
}

function getDemoBrewery(n){const q=n.toLowerCase();if(q.includes('楯')||q.includes('tatenokawa'))return demoData.tatenokawa;if(q.includes('鯉')||q.includes('koikawa'))return demoData.koikawa;if(q.includes('天吹')||q.includes('amabuki'))return demoData.amabuki;if(q.includes('獺祭')||q.includes('dassai'))return demoData.dassai;if(q.includes('久保田')||q.includes('kubota'))return demoData.kubota;return null;}

function showResults(data){
  const c=data.company,geo=data._geo,pc=data.products?.length||0;
  const mapHtml=geo&&geo.lat?`<div class="rc-map"><iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${geo.lng-0.006},${geo.lat-0.004},${geo.lng+0.006},${geo.lat+0.004}&layer=mapnik&marker=${geo.lat},${geo.lng}" width="100%" height="180" style="border:0;border-radius:10px" loading="lazy"></iframe></div>`:'';
  document.getElementById('results-list').innerHTML=`
    <div class="result-card" onclick="selectBrewery(this)" data-brewery='${JSON.stringify(data).replace(/'/g,"&#39;")}'>
      <div class="rc-name">${esc(c.name_jp)}</div>
      <div class="rc-name-en">${esc(c.name_en||'')}</div>
      <div class="rc-details">
        ${c.prefecture?`<div>📍 ${esc(c.prefecture)}</div>`:''}
        ${c.website?`<div>🌐 ${esc(c.website)}</div>`:''}
        ${c.phone?`<div>📞 ${esc(c.phone)}</div>`:''}
      </div>
      ${pc?`<div class="rc-products">🍶 ${pc} ${esc(t('res_products'))}</div>`:''}
      ${mapHtml}
      <div style="margin-top:16px;text-align:center"><button class="btn btn-primary btn-lg">${esc(t('res_select'))}</button></div>
    </div>`;
  showPage('results');
}

function selectBrewery(card){
  const data=JSON.parse(card.dataset.brewery);
  state.brewery=data;localStorage.setItem('sp_brewery',JSON.stringify(data));
  const c=data.company;
  document.getElementById('reg-brewery').textContent='🏯 '+c.name_jp+(c.name_en?' — '+c.name_en:'');
  document.getElementById('inp-email').placeholder='you@'+(c.website||'brewery.co.jp');
  const ei=document.getElementById('inp-email');
  ei.oninput=()=>{const d=(ei.value.split('@')[1]||'').toLowerCase();const bd=(c.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();document.getElementById('domain-hint').style.display=(d&&bd&&d===bd)?'block':'none';};
  document.getElementById('reg-form').style.display='';
  document.getElementById('verification-sent').style.display='none';
  showPage('register');
}

function register(){
  const name=document.getElementById('inp-name').value.trim(),email=document.getElementById('inp-email').value.trim(),pass=document.getElementById('inp-pass').value.trim();
  if(!name||!email||!pass)return;
  const c=state.brewery.company;
  const d=(email.split('@')[1]||'').toLowerCase(),bd=(c.website||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0].toLowerCase();
  const dm=d&&bd&&d===bd;
  state.user={name,email,domainMatch:dm};
  localStorage.setItem('sp_user',JSON.stringify(state.user));
  document.getElementById('reg-form').style.display='none';
  document.getElementById('verification-sent').style.display='';
  document.getElementById('verif-title').textContent=t('verif_title');
  document.getElementById('verif-desc').textContent=t('verif_desc').replace('{email}',email);
}

function enterDashboard(){
  if(!state.brewery||!state.user){showPage('search');return;}
  const c=state.brewery.company;
  document.getElementById('dash-name').innerHTML=esc(c.name_jp)+(state.user.domainMatch?` <span style="display:inline-flex;width:22px;height:22px;border-radius:50%;background:#34a853;color:#fff;font-size:12px;align-items:center;justify-content:center">✓</span>`:'');
  const b=document.getElementById('dash-badge');
  if(state.user.domainMatch){b.className='dash-verified-badge verified';b.textContent=t('verified_owner');}
  else{b.className='dash-verified-badge pending';b.textContent=t('pending_verif');}
  renderUploaded();renderProducts();
  showPage('dashboard');
}

function handleFiles(files){
  for(const f of files){state.files.push({name:f.name,size:(f.size/1024).toFixed(0)+'KB',type:f.name.split('.').pop().toUpperCase(),status:'processing'});
    setTimeout(()=>{const entry=state.files.find(e=>e.name===f.name&&e.status==='processing');if(entry)entry.status='done';localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();},2000+Math.random()*2000);
  }
  localStorage.setItem('sp_files',JSON.stringify(state.files));renderUploaded();
}

function renderUploaded(){
  const el=document.getElementById('uploaded-files');
  if(!state.files.length){el.innerHTML='';return;}
  const ic={PDF:'📕',XLSX:'📗',XLS:'📗',CSV:'📊',DOCX:'📘',DOC:'📘',JPG:'🖼',JPEG:'🖼',PNG:'🖼'};
  el.innerHTML=state.files.map(f=>`<div class="uploaded-file"><div class="uf-info"><div class="uf-icon">${ic[f.type]||'📄'}</div><div><div class="uf-name">${esc(f.name)}</div><div class="uf-meta">${esc(f.size)} · ${esc(f.type)}</div></div></div><div class="uf-status ${f.status}">${f.status==='done'?esc(t('upload_done')):esc(t('upload_processing'))}</div></div>`).join('');
}

function renderProducts(){
  const prods=state.brewery?.products||[];
  const sec=document.getElementById('products-section'),list=document.getElementById('products-list');
  if(!prods.length){sec.style.display='none';return;}
  sec.style.display='';document.getElementById('products-title').textContent=t('products_title');
  list.innerHTML=prods.map(p=>`<div class="product-row"><div><div class="pr-name">${esc(p.name_jp)}</div><div class="pr-type">${esc(p.type_detail||p.type||'')} ${p.polishing_rate?'· '+esc(p.polishing_rate):''} ${p.alcohol?'· '+esc(p.alcohol):''}</div></div></div>`).join('');
}

function logout(){state.user=null;state.brewery=null;state.files=[];localStorage.removeItem('sp_user');localStorage.removeItem('sp_brewery');localStorage.removeItem('sp_files');showPage('search');}

applyLang();
if(state.user&&state.brewery)enterDashboard();
</script>
